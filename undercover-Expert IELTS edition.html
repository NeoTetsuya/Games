        body {
            font-family: 'Nunito', sans-serif;
            background-color: #F8FAFC;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .shadow-soft {
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.03), 0 0 3px rgba(0,0,0,0.02);
        }
        .shadow-float {
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05), 0 0 5px rgba(0,0,0,0.01);
        }

        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.98) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .anim-view-enter {
            animation: fadeInScale 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.90); opacity: 0; }
            50% { transform: scale(1.03); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .anim-pop {
            animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .anim-float {
            animation: float 4s ease-in-out infinite;
        }

        .toggle-switch { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>

        // --- HELPER FUNCTIONS ---
        function getAvatar(player, size = "md") {
            const initials = player.name.substring(0, 2).toUpperCase();
            const sizeClasses = size === "sm" ? "w-8 h-8 md:w-10 md:h-10 text-[10px] md:text-xs" : size === "lg" ? "w-16 h-16 md:w-24 md:h-24 text-xl md:text-3xl" : "w-10 h-10 md:w-12 md:h-12 text-sm md:text-base";
            return `<div class="${player.color} ${sizeClasses} rounded-full flex items-center justify-center text-white font-black shadow-sm shrink-0 transition-transform duration-300 hover:scale-110">${initials}</div>`;
        }

        function updateRoleBounds() {
            if (state.players.length > 0) {
                const maxBadGuys = Math.max(1, state.players.length - 2);
                let currentBadGuys = state.undercoverCount + (state.includeMrWhite ? 1 : 0);
                
                if (currentBadGuys > maxBadGuys) {
                    state.undercoverCount = Math.max(1, maxBadGuys - (state.includeMrWhite ? 1 : 0));
                    if (state.undercoverCount + (state.includeMrWhite ? 1 : 0) > maxBadGuys) {
                        state.includeMrWhite = false;
                    }
                }
            }
        }

        function saveData() {
            localStorage.setItem('undercoverPlayers', JSON.stringify(state.players));
            localStorage.setItem('undercoverScores', JSON.stringify(state.scores));
            localStorage.setItem('undercoverSettings', JSON.stringify({
                includeMrWhite: state.includeMrWhite,
                undercoverCount: state.undercoverCount,
                deckScope: state.deckScope
            }));
        }

        function loadData() {
            const p = localStorage.getItem('undercoverPlayers');
            const s = localStorage.getItem('undercoverScores');
            const set = localStorage.getItem('undercoverSettings');
            if (p) state.players = JSON.parse(p);
            if (s) state.scores = JSON.parse(s);
            if (set) {
                const parsedSettings = JSON.parse(set);
                state.includeMrWhite = parsedSettings.includeMrWhite || false;
                state.undercoverCount = parsedSettings.undercoverCount || 1;
                state.deckScope = parsedSettings.deckScope || 'ielts';
            }
            updateRoleBounds();
        }

        window.setDeckScope = function(scope) {
            state.deckScope = scope;
            state.selectedCategory = 'All Topics'; // Reset individual category selector on scope change
            saveData();
            renderApp();
        };

        window.clearScores = function() {
            if (confirm("Are you sure you want to reset all scores to 0?")) {
                for (let key in state.scores) state.scores[key] = 0;
                saveData();
                renderApp();
            }
        };

        window.clearAllPlayers = function() {
            if (confirm("Are you sure you want to remove all players from the roster?")) {
                state.players = [];
                state.scores = {};
                updateRoleBounds();
                saveData();
                renderApp();
            }
        };

        // --- TIMER LOGIC ---
        let timerInt = null;
        let timerSecs = 90;
        let timerRunning = false;

        window.toggleTimer = function() {
            timerRunning = !timerRunning;
            const btn = document.getElementById('timer-btn-icon');
            const display = document.getElementById('timer-display');
            
            if (timerRunning) {
                btn.setAttribute('data-lucide', 'pause');
                lucide.createIcons();
                timerInt = setInterval(() => {
                    if (timerSecs > 0) {
                        timerSecs--;
                        const m = Math.floor(timerSecs / 60).toString().padStart(2, '0');
                        const s = (timerSecs % 60).toString().padStart(2, '0');
                        display.innerText = `${m}:${s}`;
                    } else {
                        clearInterval(timerInt);
                        timerRunning = false;
                        display.classList.replace('text-slate-800', 'text-red-500');
                        btn.setAttribute('data-lucide', 'play');
                        lucide.createIcons();
                    }
                }, 1000);
            } else {
                btn.setAttribute('data-lucide', 'play');
                lucide.createIcons();
                clearInterval(timerInt);
            }
        };

        window.resetTimer = function() {
            clearInterval(timerInt);
            timerRunning = false;
            timerSecs = 90;
            const display = document.getElementById('timer-display');
            if (display) {
                display.innerText = "01:30";
                display.classList.replace('text-red-500', 'text-slate-800');
            }
            const btn = document.getElementById('timer-btn-icon');
            if (btn) {
                btn.setAttribute('data-lucide', 'play');
                lucide.createIcons();
            }
        };

        // --- ACTION HANDLERS ---
        window.handleAddPlayer = function(e) {
            e.preventDefault();
            const input = document.getElementById('newPlayerName');
            const name = input.value.trim();
            if (!name) return;
            
            if (state.players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
                state.setupError = "Player name must be unique!";
                renderApp();
                return;
            }

            const newId = Date.now().toString();
            const color = AVATAR_COLORS[state.players.length % AVATAR_COLORS.length];
            
            state.players.push({ id: newId, name: name, color: color });
            state.scores[newId] = 0;
            state.setupError = '';
            
            updateRoleBounds();
            saveData();
            renderApp();
        };

        window.removePlayer = function(id) {
            state.players = state.players.filter(p => p.id !== id);
            delete state.scores[id];
            updateRoleBounds();
            saveData();
            renderApp();
        };

        window.setWordMode = function(mode) {
            state.wordMode = mode;
            renderApp();
        };

        window.setCategory = function(category) {
            state.selectedCategory = category;
            renderApp();
        };

        window.updateCustomWord = function(num, value) {
            if (num === 1) state.customWords.w1 = value;
            if (num === 2) state.customWords.w2 = value;
        };

        window.changeUndercoverCount = function(delta) {
            const min = 1;
            const max = Math.max(1, state.players.length - 2 - (state.includeMrWhite ? 1 : 0));
            state.undercoverCount = Math.min(max, Math.max(min, state.undercoverCount + delta));
            saveData();
            renderApp();
        };

        window.toggleMrWhite = function() {
            state.includeMrWhite = !state.includeMrWhite;
            updateRoleBounds();
            saveData();
            renderApp();
        };

        window.startGame = function() {
            if (state.players.length < 3) {
                state.setupError = "You need at least 3 players to start!";
                renderApp(); return;
            }
            
            const totalBadGuys = state.undercoverCount + (state.includeMrWhite ? 1 : 0);
            if (totalBadGuys >= state.players.length - 1) {
                state.setupError = "Too many bad guys! You need at least 2 Civilians.";
                renderApp(); return;
            }

            let w1, w2;
            if (state.wordMode === 'preset') {
                let availableWords = PRESET_WORDS;
                
                // NEW Feature logic parsing targeted subpool ranges explicitly
                if (state.deckScope === 'ielts') {
                    availableWords = PRESET_WORDS.filter(p => p.category === 'Expert IELTS 5 (M1-5)');
                } else {
                    if (state.selectedCategory !== 'All Topics') {
                        availableWords = PRESET_WORDS.filter(p => p.category === state.selectedCategory);
                    }
                }
                
                if (availableWords.length === 0) {
                    state.setupError = "No word entries match the requested topic constraint selection.";
                    renderApp(); return;
                }

                const randomIdx = Math.floor(Math.random() * availableWords.length);
                w1 = availableWords[randomIdx].w1;
                w2 = availableWords[randomIdx].w2;
            } else {
                if (!state.customWords.w1.trim() || !state.customWords.w2.trim()) {
                    state.setupError = "Please enter both custom words!";
                    renderApp(); return;
                }
                w1 = state.customWords.w1.trim();
                w2 = state.customWords.w2.trim();
            }

            const isW1Civ = Math.random() > 0.5;
            const civWord = isW1Civ ? w1 : w2;
            const undWord = isW1Civ ? w2 : w1;
            state.roundWords = { civ: civWord, und: undWord };

            let assignedPlayers = state.players.map((p, idx) => {
                let role = 'civilian';
                let word = civWord;
                
                if (idx < state.undercoverCount) {
                    role = 'undercover';
                    word = undWord;
                } else if (state.includeMrWhite && idx === state.undercoverCount) {
                    role = 'mrwhite';
                    word = 'You are Mr. White! You have no word. Blend in!';
                }
                
                return { ...p, role: role, word: word, isAlive: true };
            });

            for (let i = assignedPlayers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [assignedPlayers[i], assignedPlayers[j]] = [assignedPlayers[j], assignedPlayers[i]];
            }

            state.activePlayers = assignedPlayers;
            state.gameState = 'reveal';
            state.currentPlayerIndex = 0;
            state.showWord = false;
            state.setupError = '';
            state.roundNumber = 1;
            
            window.resetTimer();
            renderApp();
        };

        window.setShowWord = function(show) {
            state.showWord = show;
            renderApp();
        };

        window.handleNextReveal = function() {
            state.showWord = false;
            if (state.currentPlayerIndex + 1 < state.activePlayers.length) {
                state.currentPlayerIndex += 1;
                renderApp();
            } else {
                state.gameState = 'round';
                const alivePlayers = state.activePlayers.filter(p => p.isAlive);
                const startIndex = Math.floor(Math.random() * alivePlayers.length);
                state.roundSpeakerOrder = [...alivePlayers.slice(startIndex), ...alivePlayers.slice(0, startIndex)];
                state.currentSpeakerIndex = 0;
                state.showHostPeek = false;
                renderApp();
            }
        };

        window.nextSpeaker = function() {
            if (state.currentSpeakerIndex < state.roundSpeakerOrder.length) {
                state.currentSpeakerIndex++;
                renderApp();
            }
        };

        window.prevSpeaker = function() {
            if (state.currentSpeakerIndex > 0) {
                state.currentSpeakerIndex--;
                renderApp();
            }
        };

        window.toggleHostPeek = function() {
            state.showHostPeek = !state.showHostPeek;
            renderApp();
        };

        window.setPendingVote = function(id) {
            state.pendingVote = state.pendingVote === id ? null : id;
            renderApp();
        };

        window.confirmElimination = function() {
            if (!state.pendingVote) return;

            const targetId = state.pendingVote;
            state.activePlayers = state.activePlayers.map(p => 
                p.id === targetId ? { ...p, isAlive: false } : p
            );
            
            state.eliminatedThisRound = state.activePlayers.find(p => p.id === targetId);
            state.pendingVote = null;

            const alivePlayers = state.activePlayers.filter(p => p.isAlive);
            const aliveUndercovers = alivePlayers.filter(p => p.role === 'undercover').length;
            const aliveMrWhites = alivePlayers.filter(p => p.role === 'mrwhite').length;
            const aliveCivilians = alivePlayers.filter(p => p.role === 'civilian').length;
            const aliveBadGuys = aliveUndercovers + aliveMrWhites;

            let matchWinner = null;
            if (aliveBadGuys === 0) {
                matchWinner = 'civilians';
            } else if (aliveBadGuys >= aliveCivilians) {
                matchWinner = 'badguys';
            }

            if (matchWinner) {
                state.winner = matchWinner;
                state.activePlayers.forEach(p => {
                    if (matchWinner === 'civilians' && p.role === 'civilian') {
                        state.scores[p.id] += 2;
                    } else if (matchWinner === 'badguys') {
                        if (p.role === 'undercover') state.scores[p.id] += 10;
                        if (p.role === 'mrwhite' && p.isAlive) state.scores[p.id] += 15;
                        if (p.role === 'mrwhite' && !p.isAlive) state.scores[p.id] += 5; 
                    }
                });
                saveData();
                state.gameState = 'gameover';
                setTimeout(() => {
                    confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
                }, 300);
            } else {
                state.gameState = 'result';
            }
            renderApp();
        };

        window.nextRound = function() {
            const alivePlayers = state.activePlayers.filter(p => p.isAlive);
            const startIndex = Math.floor(Math.random() * alivePlayers.length);
            state.roundSpeakerOrder = [...alivePlayers.slice(startIndex), ...alivePlayers.slice(0, startIndex)];
            state.currentSpeakerIndex = 0;
            state.gameState = 'round';
            state.roundNumber++;
            state.showHostPeek = false;
            window.resetTimer();
            renderApp();

                                <i id="timer-btn-icon" data-lucide="play" class="w-6 h-6 fill-current"></i>
                            </button>
                            <button onclick="window.resetTimer()" class="flex-1 bg-white border-2 border-slate-800 hover:bg-slate-50 text-slate-800 p-3 rounded-xl transition active:scale-95">
                                <i data-lucide="rotate-ccw" class="w-6 h-6"></i>
                            </button>
                        </div>
                    </div>

                    <button onclick="window.goToVote()" class="w-full lg:w-auto bg-[#EF4444] text-white font-black py-4 px-8 rounded-full shadow-lg shadow-red-100 hover:bg-red-600 transition-all text-base flex items-center justify-center gap-2">
                        <i data-lucide="vote" class="w-5 h-5"></i> COMMENCE TRIAL VOTING
                    </button>
                </div>

            </div>`;
        }

        function renderVote() {
            const aliveCount = state.activePlayers.filter(p => p.isAlive).length;
            
            const optionsHtml = state.activePlayers.map(p => {
                if (!p.isAlive) {
                    return `
                        <div class="p-4 rounded-2xl bg-slate-100 border border-slate-200 opacity-50 grayscale flex items-center gap-3 cursor-not-allowed">
                            <div class="relative shrink-0">
                                ${getAvatar(p)}
                                <div class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full text-white text-xs"><i data-lucide="skull" class="w-3 h-3"></i></div>
                            </div>
                            <span class="line-through text-slate-500 font-bold text-base truncate">${p.name}</span>
                        </div>
                    `;
                }

                const isSelected = state.pendingVote === p.id;
                const baseClasses = isSelected 
                    ? 'border-[#EF4444] bg-red-50 text-[#EF4444] shadow-md ring-4 ring-red-500/10 scale-[1.01]' 
                    : 'border-white bg-white text-slate-700 hover:border-slate-200 hover:shadow-md';
                const circleClasses = isSelected ? 'border-[#EF4444] bg-[#EF4444] text-white' : 'border-slate-200 bg-slate-50';
                
                return `
                    <button onclick="window.setPendingVote('${p.id}')" class="p-4 rounded-2xl text-left font-black text-lg transition-all duration-300 flex justify-between items-center border-2 shadow-soft ${baseClasses}">
                        <div class="flex items-center gap-3 overflow-hidden">
                            ${getAvatar(p)}
                            <span class="truncate">${p.name}</span>
                        </div>
                        <div class="h-6 w-6 rounded-full border-2 flex items-center justify-center shrink-0 transition-all duration-300 ${circleClasses}">
                            ${isSelected ? '<i data-lucide="check" class="w-4 h-4 anim-pop font-bold"></i>' : ''}
                        </div>
                    </button>
                `;
            }).join('');

            return `
            <div class="flex-1 flex flex-col items-center justify-center w-full">
                <div class="w-full max-w-3xl flex flex-col">
                    <div class="text-center mb-8">
                        <span class="bg-white/80 px-3 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase text-slate-500 shadow-sm border border-slate-100 mb-4 inline-block">
                            Trial Parameters &bull; ${aliveCount} Players Remaining
                        </span>
                        <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2 flex items-center justify-center gap-2">
                            Cast Exile Ballots
                        </h1>
                        <p class="text-slate-500 font-bold text-sm">Identify the mismatching linguistic node actor.</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-8">
                        ${optionsHtml}
                    </div>
                    
                    <div class="flex flex-col items-center gap-3 w-full max-w-md mx-auto mt-auto sm:mt-0">
                        ${state.pendingVote ? `
                            <button onclick="window.confirmElimination()" class="w-full bg-[#EF4444] text-white font-black py-4 rounded-full shadow-lg shadow-red-200 hover:bg-red-600 transition-all text-base hover:-translate-y-0.5">
                                Eject Identified Node Card
                            </button>
                        ` : `
                            <div class="w-full bg-slate-200/50 text-slate-400 font-black py-4 rounded-full text-center text-base border-2 border-dashed border-slate-300">
                                Assign target parameter marker
                            </div>
                        `}
                        <button onclick="window.nextRound()" class="text-slate-500 font-bold py-3 px-6 hover:bg-white rounded-full transition flex items-center justify-center gap-2 text-sm">
                            <i data-lucide="x" class="w-4 h-4"></i> Resume Contextual Assessment
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderResult() {
            const eliminated = state.eliminatedThisRound;
            
            let bgClass = 'bg-blue-50 border-blue-100';
            let lblClass = 'text-blue-400';
            let txtClass = 'text-blue-600';
            let roleTxt = 'CIVILIAN';
            
            if (eliminated?.role === 'undercover') {
                bgClass = 'bg-purple-50 border-purple-100';
                lblClass = 'text-purple-400';
                txtClass = 'text-purple-600';
                roleTxt = 'UNDERCOVER AGENT';
            } else if (eliminated?.role === 'mrwhite') {
                bgClass = 'bg-slate-100 border-slate-200';
                lblClass = 'text-slate-500';
                txtClass = 'text-slate-800';
                roleTxt = 'MR. WHITE';
            }

            return `
            <div class="flex-1 flex flex-col items-center justify-center w-full">
                <div class="w-full max-w-md bg-white rounded-3xl shadow-float border border-slate-100 text-center relative overflow-hidden flex flex-col">
                    <div class="bg-slate-800 p-6 text-white relative">
                        <span class="bg-white/10 px-4 py-1.5 rounded-full text-[10px] font-black tracking-widest uppercase text-slate-300 inline-block">
                            Ejection Reveal Metrics
                        </span>
                    </div>
                    <div class="p-8 relative z-10 bg-white">
                        <div class="flex justify-center mb-6">
                            ${getAvatar(state.eliminatedThisRound, 'lg')}
                        </div>
                        <h2 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">${state.eliminatedThisRound?.name}</h2>
                        <p class="text-slate-500 mb-8 font-bold text-sm">has been processed out of the session active layer.</p>
                        
                        <div class="p-6 rounded-2xl mb-8 border relative z-10 ${bgClass} anim-pop shadow-inner">
                            <p class="text-[10px] font-black uppercase tracking-widest mb-2 ${lblClass}">Allocated Class Role was:</p>
                            <p class="text-2xl font-black tracking-tight ${txtClass}">
                                ${roleTxt}
                            </p>
                        </div>

                        <button onclick="window.nextRound()" class="w-full bg-slate-900 text-white font-black py-4 rounded-full shadow-lg hover:bg-slate-800 transition-all text-base">
                            Advance Framework
                        </button>
                    </div>
                </div>
            </div>`;
        }

        function renderGameover() {
            const isCivWin = state.winner === 'civilians';
            const headerBg = isCivWin ? 'bg-[#EEF2FF] text-[#4F46E5]' : 'bg-[#FAF5FF] text-[#9333EA]';
            const headerTitle = isCivWin ? 'Civilians Rule!' : 'Infiltrators Overran!';
            const headerSub = isCivWin ? 'Standard +2 Base Points granted onto Roster' : '+10 Undercovers / +15 Active Mr. White Survivor Units';
            const iconColor = isCivWin ? 'text-[#818CF8]' : 'text-[#C084FC]';
            
            const sortedPlayers = [...state.activePlayers].sort((x, y) => state.scores[y.id] - state.scores[x.id]);
            
            const recapHtml = state.activePlayers.map(p => {
                let rBadge = p.role === 'undercover' ? 'bg-purple-100 text-purple-700' : 
                             p.role === 'mrwhite' ? 'bg-slate-200 text-slate-700' : 'bg-blue-100 text-blue-700';
                return `
                <div class="flex items-center justify-between p-2 bg-white border border-slate-100 rounded-xl mb-2 shadow-sm">
                    <div class="flex items-center gap-3">
                        ${getAvatar(p, 'sm')}
                        <span class="font-bold text-slate-700 text-sm">${p.name}</span>
                    </div>
                    <span class="px-2 py-0.5 rounded-md text-[9px] font-black uppercase tracking-widest ${rBadge}">
                        ${p.role}
                    </span>
                </div>
                `;
            }).join('');

            const leaderboardHtml = sortedPlayers.map((p, index) => {
                return `
                <li class="flex justify-between items-center text-sm bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-3 overflow-hidden pr-2">
                        <div class="w-5 text-slate-300 font-black text-center text-sm shrink-0">#${index + 1}</div>
                        ${getAvatar(p, 'sm')}
                        <span class="font-bold text-slate-700 truncate">${p.name}</span>
                    </div>
                    <div class="flex items-center gap-2 shrink-0">
                        <span class="font-black text-lg text-slate-800 w-6 text-right">${state.scores[p.id]}</span>
                    </div>
                </li>
                `;
            }).join('');

            return `
            <div class="flex-1 flex flex-col items-center justify-center w-full">
                <div class="w-full max-w-5xl bg-white rounded-3xl shadow-float border border-slate-100/50 overflow-hidden flex flex-col">
                    
                    <div class="p-8 md:p-14 text-center relative ${headerBg}">
                        <h1 class="text-3xl md:text-5xl font-black mb-2 flex justify-center items-center gap-4 tracking-tight relative z-10">
                            <i data-lucide="trophy" class="w-10 h-10 md:w-14 md:h-14 ${iconColor} anim-float"></i> 
                            ${headerTitle}
                        </h1>
                        <p class="font-bold uppercase tracking-widest text-[10px] relative z-10 opacity-80">${headerSub}</p>
                    </div>

                    <div class="p-6 md:p-10">
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                            
                            <!-- Array Allocations Summary -->
                            <div class="flex flex-col">
                                <h2 class="text-slate-800 font-black text-lg mb-4 flex items-center gap-2">
                                    <div class="bg-amber-100 text-amber-600 p-2 rounded-lg"><i data-lucide="book-open" class="w-5 h-5"></i></div>
                                    Target Matchup Verification Keys
                                </h2>
                                <div class="bg-amber-50/60 rounded-2xl p-5 border border-amber-100 flex-1 flex flex-col">
                                    <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                                        <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col justify-center overflow-hidden border border-slate-100">
                                            <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Civilians</p>
                                            <p class="text-base font-black text-[#4F46E5] truncate">${state.roundWords.civ}</p>
                                        </div>
                                        <div class="bg-white p-3 rounded-xl shadow-sm flex flex-col justify-center overflow-hidden border border-slate-100">
                                            <p class="text-[9px] font-black uppercase tracking-widest text-slate-400 mb-1">Undercovers</p>
                                            <p class="text-base font-black text-[#9333EA] truncate">${state.roundWords.und}</p>
                                        </div>
                                    </div>
                                    <p class="text-slate-400 font-bold uppercase tracking-widest text-[9px] mb-3">Identity allocation history map:</p>
                                    <div class="flex-1 overflow-y-auto custom-scrollbar pr-2 max-h-[180px]">
                                        ${recapHtml}
                                    </div>
                                </div>
                            </div>

                            <!-- Score Leaderboard -->
                            <div class="flex flex-col h-full max-h-[380px]">
                                <h3 class="text-slate-800 font-black text-lg mb-4 flex items-center gap-2">
                                    <div class="bg-slate-100 text-slate-600 p-2 rounded-lg"><i data-lucide="bar-chart-2" class="w-5 h-5"></i></div>
                                    Cumulative Classroom Scoreboard
                                </h3>
                                <ul class="space-y-2 overflow-y-auto custom-scrollbar pr-2 flex-1 bg-slate-50/50 p-4 rounded-2xl border border-slate-100">
                                    ${leaderboardHtml}
                                </ul>
                            </div>
                        </div>

                        <button onclick="window.resetGame()" class="w-full bg-slate-900 text-white font-black py-4 rounded-full shadow-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 text-base">
                            <i data-lucide="refresh-cw" class="w-5 h-5"></i> ITERATE NEW SESSION ENTRY
                        </button>
                    </div>
                </div>
            </div>`;
        }

        // --- CORE APP RENDERER ---
        function renderApp() {
            const app = document.getElementById('app');
            let html = '';

            switch (state.gameState) {
                case 'setup': html = renderSetup(); break;
                case 'reveal': html = renderReveal(); break;
                case 'round': html = renderRound(); break;
                case 'vote': html = renderVote(); break;
                case 'result': html = renderResult(); break;
                case 'gameover': html = renderGameover(); break;
            }

            app.innerHTML = html;
            
            if (tracking.gameState !== state.gameState) {
                const view = app.firstElementChild;
                if (view) view.classList.add('anim-view-enter');
                tracking.gameState = state.gameState;
            }

            if (state.gameState === 'reveal') {
                setTimeout(() => {
                    const bar = document.getElementById('reveal-progress-bar');
                    const currentProgress = ((state.currentPlayerIndex + (state.showWord ? 1 : 0)) / state.activePlayers.length) * 100;
                    if (bar) bar.style.width = currentProgress + '%';
                    tracking.prevProgress = currentProgress;
                }, 50);
            } else {
                tracking.prevProgress = 0;
            }

            tracking.speakerIndex = state.currentSpeakerIndex;
            tracking.showWord = state.showWord;
            
            lucide.createIcons();
        }

        // Initialize App Context
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            renderApp();

            window.addEventListener('beforeunload', function (e) {
                if (state.gameState !== 'setup' && state.gameState !== 'gameover') {
                    e.preventDefault();
                    e.returnValue = 'A game session loop is actively processing.';
                    return 'A game session loop is actively processing.';
                }
            });
        });
    </script>
</body>
</html>
