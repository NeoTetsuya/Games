    // --- AUDIO SYSTEM ---
    let audioCtx;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playDing() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note
      osc.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.1); // Slide up to A6
      gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function playBuzz() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(150, audioCtx.currentTime); // Low pitch
      osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3); // Slide down slightly
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.4);
    }

    function playTick() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(1000, audioCtx.currentTime); // High pitch tick
      gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Very quiet
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05); // Very short
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.05);
    }

    function playCountdownBeep() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 note
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.2);
    }

    function playCountdownStart() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime); // A5 note (an octave higher)
      gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.6);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.6);
    }

    function playGameOver() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(300, audioCtx.currentTime); 
      osc.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 1); // Descending pitch
      gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 1);
    }

    // Helper to shuffle array (Fisher-Yates)
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // Helper to format time (MM:SS)
    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    };

        }).join('')}

    let teamB = 'Team B';
    let timeLimit = 60; // in seconds
    let teamATime = 0;
    let teamBTime = 0;
    let scoreA = 0;
    let scoreB = 0;
    let currentTurn = 'A'; // 'A' or 'B'
    let questions = [];
    let currentQuestionIndex = 0;
    let countdownValue = 3;
    let gameTimer = null;
    let cdTimer = null;
    let winner = '';
    
    // Variables for reveal phase
    let showAnswer = false; 
    let lastAnswerStatus = ''; // 'correct' or 'pass'

    // --- ACTIONS ---
    function triggerStartGame() {
      // Initialize Audio Context on first user interaction
      initAudio();

      // Read values from inputs
      teamA = document.getElementById('teamAInput').value || 'Team A';
      teamB = document.getElementById('teamBInput').value || 'Team B';
      timeLimit = parseInt(document.getElementById('timeSelect').value) || 60;

      teamATime = timeLimit;
      teamBTime = timeLimit;
      scoreA = 0;
      scoreB = 0;
      currentTurn = 'A';
      
      questions = shuffleArray(IDIOMS_DATA);
      currentQuestionIndex = 0;
      winner = '';
      showAnswer = false;

      gameState = 'COUNTDOWN';
      countdownValue = 3;
      renderApp();
      
      playCountdownBeep(); // Play initial beep for "3"

      // Start Pre-game Countdown
      cdTimer = setInterval(() => {
        countdownValue--;
        if (countdownValue <= 0) {
          clearInterval(cdTimer);
          playCountdownStart(); // Play high pitched beep for "Start"
          gameState = 'PLAYING';
          renderApp();
          startGameTimer();
        } else {
          playCountdownBeep(); // Play normal beep for "2" and "1"
          // Update DOM directly to prevent re-rendering during countdown
          const cdEl = document.getElementById('countdown-display');
          if (cdEl) cdEl.innerText = countdownValue;
        }
      }, 1000);
    }

    function startGameTimer() {
      clearInterval(gameTimer);
      gameTimer = setInterval(() => {
        if (currentTurn === 'A') {
          teamATime--;
          if (teamATime <= 10 && teamATime > 0) playTick();
          if (teamATime <= 0) {
            teamATime = 0;
            winner = teamB; // Team B wins if Team A runs out of time
            triggerEndGame();
            return;
          }
        } else {
          teamBTime--;
          if (teamBTime <= 10 && teamBTime > 0) playTick();
          if (teamBTime <= 0) {
            teamBTime = 0;
            winner = teamA; // Team A wins if Team B runs out of time
            triggerEndGame();
            return;
          }
        }
        
        // Update DOM directly to avoid re-rendering entire app and resetting CSS animations
        const timeAEl = document.getElementById('time-display-A');
        const timeBEl = document.getElementById('time-display-B');
        const barAEl = document.getElementById('timer-bar-A');
        const barBEl = document.getElementById('timer-bar-B');
        
        if (timeAEl && barAEl) {
            timeAEl.innerText = formatTime(teamATime);
            barAEl.style.width = `${(teamATime / timeLimit) * 100}%`;
            if (teamATime <= 10) timeAEl.classList.add('text-red-500', 'animate-pulse');
            else timeAEl.classList.remove('text-red-500', 'animate-pulse');
        }
        if (timeBEl && barBEl) {
            timeBEl.innerText = formatTime(teamBTime);
            barBEl.style.width = `${(teamBTime / timeLimit) * 100}%`;
            if (teamBTime <= 10) timeBEl.classList.add('text-red-500', 'animate-pulse');
            else timeBEl.classList.remove('text-red-500', 'animate-pulse');
        }
      }, 1000);
    }

    function togglePause() {
      if (gameState === 'PLAYING' && !showAnswer) {
        clearInterval(gameTimer);
        gameState = 'PAUSED';
        renderApp();
      } else if (gameState === 'PAUSED') {
        gameState = 'PLAYING';
        renderApp();
        startGameTimer();
      }
    }

    function handlePass() {
      playBuzz();
      clearInterval(gameTimer); // Pause the timer while viewing the answer
      lastAnswerStatus = 'pass';
      showAnswer = true;
      renderApp();
    }

    function handleCorrect() {
      playDing();
      clearInterval(gameTimer); // Pause the timer while viewing the answer
      
      if (currentTurn === 'A') scoreA++;
      else scoreB++;
      
      lastAnswerStatus = 'correct';
      showAnswer = true;
      renderApp();
    }

    function handleNext() {
      // If it was correct, we officially switch turns now
      if (lastAnswerStatus === 'correct') {
          currentTurn = currentTurn === 'A' ? 'B' : 'A';
      }
      
      // Move to the next question
      currentQuestionIndex++;
      if (currentQuestionIndex >= questions.length) {
        questions = shuffleArray(IDIOMS_DATA);
        currentQuestionIndex = 0;
      }
      
      showAnswer = false;
      renderApp();
      startGameTimer(); // Resume the timer
    }

    function triggerEndGame() {
      playGameOver(); // Play time's up sound
      clearInterval(gameTimer);
      gameState = 'END';
      renderApp();
    }

    function triggerEndGameEarly() {
      if(confirm("Are you sure you want to end the game early?")) {
          playGameOver(); // Play time's up sound
          clearInterval(gameTimer);
          clearInterval(cdTimer);
          winner = "Tie"; // Generic early end state
          gameState = 'END';
          renderApp();
      }
    }

    function triggerPlayAgain() {
      gameState = 'SETUP';
      renderApp();
    }

    // --- RENDER FUNCTIONS ---
    function renderSetup() {
      return `
        <div class="flex-1 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
          <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 w-full max-w-lg animate-zoom-in">
            <div class="text-center mb-8">
              <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-600 mb-2 drop-shadow-sm">
                Guess The Idiom
              </h1>
              <p class="text-gray-500 font-medium">The fast-paced visual guessing game!</p>
            </div>

            <div class="space-y-6">
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="teamAInput">Team 1 Name</label>
                  <input 
                    id="teamAInput"
                    type="text" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all shadow-sm"
                    value="${teamA}"
                    maxlength="20"
                    onkeypress="if(event.key === 'Enter') triggerStartGame()"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="teamBInput">Team 2 Name</label>
                  <input 
                    id="teamBInput"
                    type="text" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition-all shadow-sm"
                    value="${teamB}"
                    maxlength="20"
                    onkeypress="if(event.key === 'Enter') triggerStartGame()"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="timeSelect">Time per Team</label>
                  <div class="relative">
                    <select 
                      id="timeSelect"
                      class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none appearance-none cursor-pointer shadow-sm bg-white font-medium"
                    >
                      <option value="30">30 Seconds (Blitz)</option>
                      <option value="60" selected>60 Seconds (Standard)</option>
                      <option value="90">90 Seconds (Long)</option>
                      <option value="120">120 Seconds (Marathon)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                      <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                  </div>
                </div>
              </div>

              <button 
                onclick="triggerStartGame()"
                class="w-full py-4 bg-gradient-to-r from-indigo-600 to-pink-600 hover:from-indigo-700 hover:to-pink-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2"
              >
                Start Game <i data-lucide="play" class="w-5 h-5 fill-current"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderCountdown() {
      return `
        <div class="flex-1 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex flex-col items-center justify-center p-4">
          <div class="text-white text-center animate-zoom-in">
            <h2 class="text-3xl md:text-5xl font-bold mb-4 drop-shadow-sm text-indigo-100 uppercase tracking-widest">Get Ready!</h2>
            <div id="countdown-display" class="text-9xl md:text-[15rem] font-black drop-shadow-2xl animate-pulse">
              ${countdownValue}
            </div>
          </div>
        </div>
      `;
    }

    function renderPlaying() {
      const currentQ = questions[currentQuestionIndex];
      const activeTeamName = currentTurn === 'A' ? teamA : teamB;
      const isTeamA = currentTurn === 'A';

      // Generate HTML for beautifully spaced word blanks
      const blanksHTML = generateBlanksHTML(currentQ.idiom);

      return `
        <div class="flex-1 flex flex-col font-sans text-gray-800 relative">
          <!-- Header Scoreboard & Timers -->
          <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-20">
            
            <!-- Team A -->
            <div class="flex items-center gap-3 px-3 py-2 md:px-5 md:py-3 rounded-2xl transition-all duration-300 ${currentTurn === 'A' ? 'bg-indigo-50 ring-2 ring-indigo-400 scale-[1.02] shadow-sm' : 'opacity-60'} relative overflow-hidden">
              <div id="timer-bar-A" class="absolute bottom-0 left-0 h-1.5 bg-indigo-500 transition-all duration-1000 ease-linear" style="width: ${(teamATime / timeLimit) * 100}%;"></div>
              <div class="flex flex-col relative z-10">
                <span class="font-bold ${currentTurn === 'A' ? 'text-indigo-900' : 'text-gray-500'} truncate max-w-[100px] text-xs md:text-sm uppercase tracking-wide">${teamA}</span>
                <span id="time-display-A" class="text-2xl md:text-4xl font-black font-mono transition-colors ${currentTurn === 'A' && !showAnswer ? 'text-indigo-600' : 'text-gray-400'}">${formatTime(teamATime)}</span>
              </div>
            </div>
            
            <!-- Turn Indicator & Header Actions -->
            <div class="flex flex-col items-center flex-1 mx-2">
              <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold shadow-sm ${isTeamA ? 'bg-indigo-100 text-indigo-700' : 'bg-pink-100 text-pink-700'} ${showAnswer || gameState === 'PAUSED' ? 'animate-pulse' : ''}">
                <i data-lucide="${gameState === 'PAUSED' || showAnswer ? 'pause-circle' : 'mic'}" class="w-3 h-3"></i> 
                ${gameState === 'PAUSED' ? 'PAUSED' : showAnswer ? 'TIMER PAUSED' : `${activeTeamName}'s Turn`}
              </div>
              <div class="flex gap-4 mt-2">
                  <button onclick="togglePause()" aria-label="Pause Game" class="text-xs font-semibold ${gameState === 'PAUSED' ? 'text-indigo-500 font-bold' : 'text-gray-400'} hover:text-indigo-600 transition-colors uppercase tracking-widest" ${showAnswer ? 'disabled' : ''}>
                    ${gameState === 'PAUSED' ? 'Resume' : 'Pause'}
                  </button>
                  <button onclick="triggerEndGameEarly()" aria-label="End Game" class="text-xs font-semibold text-gray-400 hover:text-red-500 transition-colors uppercase tracking-widest">
                    Quit
                  </button>
              </div>
            </div>

            <!-- Team B -->
            <div class="flex items-center gap-3 px-3 py-2 md:px-5 md:py-3 rounded-2xl transition-all duration-300 ${currentTurn === 'B' ? 'bg-pink-50 ring-2 ring-pink-400 scale-[1.02] shadow-sm' : 'opacity-60'} relative overflow-hidden">
              <div id="timer-bar-B" class="absolute bottom-0 right-0 h-1.5 bg-pink-500 transition-all duration-1000 ease-linear" style="width: ${(teamBTime / timeLimit) * 100}%;"></div>
              <div class="flex flex-col items-end relative z-10">
                <span class="font-bold ${currentTurn === 'B' ? 'text-pink-900' : 'text-gray-500'} truncate max-w-[100px] text-xs md:text-sm uppercase tracking-wide text-right">${teamB}</span>
                <span id="time-display-B" class="text-2xl md:text-4xl font-black font-mono transition-colors ${currentTurn === 'B' && !showAnswer ? 'text-pink-600' : 'text-gray-400'}">${formatTime(teamBTime)}</span>
              </div>
            </div>
          </header>

          <!-- Main Game Area -->
          <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-8 flex flex-col justify-center relative">
            
            ${gameState === 'PAUSED' ? `
              <!-- Paused Overlay (Hides puzzle to prevent cheating) -->
              <div class="absolute inset-0 z-50 flex items-center justify-center p-4 bg-white/50 backdrop-blur-md rounded-3xl animate-zoom-in">
                  <div class="bg-white p-8 rounded-3xl shadow-xl text-center flex flex-col items-center">
                      <i data-lucide="pause-circle" class="w-16 h-16 text-indigo-500 mb-4"></i>
                      <h2 class="text-3xl font-black text-gray-800 mb-6">Game Paused</h2>
                      <button 
                        onclick="togglePause()"
                        class="px-8 py-4 rounded-xl font-bold text-white bg-indigo-600 hover:bg-indigo-700 shadow-lg shadow-indigo-200 transform active:scale-95 transition-all text-xl flex items-center justify-center gap-2"
                      >
                        <i data-lucide="play" class="w-6 h-6 fill-current"></i> Resume Game
                      </button>
                  </div>
              </div>
            ` : ''}

            <!-- Puzzle Card -->
            <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden border border-gray-100 flex-1 flex flex-col relative animate-zoom-in min-h-[400px]">
              <div class="relative w-full flex-1 flex flex-col items-center justify-center overflow-hidden p-6 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-50 via-gray-50 to-slate-100">
                
                <!-- Emoji Display -->
                <div class="text-6xl md:text-8xl lg:text-9xl drop-shadow-lg mb-8 ${!showAnswer ? 'animate-float' : ''} select-none cursor-default z-10 transition-transform duration-500 ${showAnswer ? 'scale-75 mb-4' : ''} flex flex-wrap justify-center items-center">
                  ${currentQ.emojis}
                </div>

                ${!showAnswer ? `
                  <!-- Word Blanks Hint (Shown during guessing phase) -->
                  <div class="bg-white/80 backdrop-blur px-6 md:px-10 py-5 rounded-2xl shadow-sm border border-gray-100 z-10 animate-fade-in w-full max-w-3xl">
                      <div class="text-3xl md:text-5xl font-mono font-bold text-gray-400 text-center select-none">
                        ${blanksHTML}
                      </div>
                  </div>
                ` : `
                  <!-- Reveal Answer (Shown after Pass/Correct) -->
                  <div class="bg-white/90 backdrop-blur px-8 py-6 rounded-2xl shadow-sm border border-gray-200 z-10 text-center w-full max-w-2xl animate-zoom-in">
                      <h3 class="text-sm font-bold ${lastAnswerStatus === 'correct' ? 'text-green-500' : 'text-orange-500'} uppercase tracking-widest mb-3 flex items-center justify-center gap-2">
                          <i data-lucide="${lastAnswerStatus === 'correct' ? 'check-circle' : 'skip-forward'}" class="w-5 h-5"></i> 
                          ${lastAnswerStatus === 'correct' ? 'Correct!' : 'Passed'}
                      </h3>
                      <div class="text-3xl md:text-5xl font-black text-gray-800 select-none mb-4">
                        ${currentQ.idiom}
                      </div>
                      <div class="flex items-center justify-center gap-3 text-gray-600 bg-gray-50 border border-gray-100 rounded-xl p-4">
                        <i data-lucide="info" class="w-5 h-5 shrink-0 text-blue-500"></i>
                        <p class="text-sm md:text-base text-left font-medium">${currentQ.meaning}</p>
                      </div>
                  </div>
                `}
              </div>

              <!-- Action Bar -->
              <div class="p-4 md:p-6 bg-white border-t border-gray-100 flex gap-4 justify-between items-center z-40 bg-gray-50/50">
                  ${!showAnswer ? `
                    <!-- Guessing Phase Buttons -->
                    <button 
                      onclick="handlePass()"
                      class="flex-1 py-4 md:py-6 rounded-2xl font-black text-gray-600 bg-gray-100 hover:bg-gray-200 border border-gray-200 shadow-sm transform active:scale-95 transition-all text-xl md:text-2xl flex items-center justify-center gap-3"
                    >
                      <i data-lucide="skip-forward" class="w-7 h-7"></i> Pass
                    </button>
                    
                    <button 
                      onclick="handleCorrect()"
                      class="flex-1 py-4 md:py-6 rounded-2xl font-black text-white bg-green-500 hover:bg-green-600 shadow-lg shadow-green-200 transform active:scale-95 transition-all text-xl md:text-2xl flex items-center justify-center gap-3"
                    >
                      <i data-lucide="check-circle" class="w-7 h-7"></i> Correct
                    </button>
                  ` : `
                    <!-- Reveal Phase Button -->
                    <button 
                      onclick="handleNext()"
                      class="w-full py-4 md:py-6 rounded-2xl font-black text-white ${lastAnswerStatus === 'correct' ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200' : 'bg-orange-500 hover:bg-orange-600 shadow-orange-200'} shadow-lg transform active:scale-95 transition-all text-xl md:text-2xl flex items-center justify-center gap-3"
                    >
                      ${lastAnswerStatus === 'correct' ? `Pass to ${currentTurn === 'A' ? teamB : teamA}` : 'Next Question'} 
                      <i data-lucide="arrow-right" class="w-7 h-7"></i>
                    </button>
                  `}
              </div>
            </div>
          </main>
        </div>
      `;
    }

    function renderEnd() {
      const isTie = winner === "Tie";
      const loser = winner === teamA ? teamB : teamA;
      
      return `
        <div class="flex-1 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
          <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-lg text-center animate-zoom-in duration-300">
            <div class="relative inline-block mb-6">
                <i data-lucide="${isTie ? 'stop-circle' : 'alarm-clock'}" class="w-24 h-24 relative z-10 ${isTie ? 'text-gray-400' : 'text-red-500 animate-bounce'}"></i>
            </div>
            
            <h2 class="text-5xl font-black text-gray-800 mb-2">
              ${isTie ? "Game Stopped" : `${winner} Wins!`}
            </h2>
            <p class="text-lg text-gray-500 mb-8 font-medium">
                ${isTie ? "You ended the game early." : `Time's up for ${loser}!`}
            </p>

            <div class="grid grid-cols-2 gap-4 mb-8">
              <div class="p-5 rounded-2xl bg-indigo-50 border border-indigo-100 flex flex-col items-center">
                <div class="text-indigo-600 font-bold truncate text-lg mb-1 w-full text-center">${teamA}</div>
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1">Guessed</div>
                <div class="text-4xl font-black text-gray-800 mb-3">${scoreA}</div>
                <div class="text-xs font-mono font-bold px-3 py-1 bg-white rounded-full text-indigo-500 border border-indigo-100 shadow-sm">Time: ${formatTime(teamATime)}</div>
              </div>
              <div class="p-5 rounded-2xl bg-pink-50 border border-pink-100 flex flex-col items-center">
                <div class="text-pink-600 font-bold truncate text-lg mb-1 w-full text-center">${teamB}</div>
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-widest mb-1">Guessed</div>
                <div class="text-4xl font-black text-gray-800 mb-3">${scoreB}</div>
                <div class="text-xs font-mono font-bold px-3 py-1 bg-white rounded-full text-pink-500 border border-pink-100 shadow-sm">Time: ${formatTime(teamBTime)}</div>
              </div>
            </div>

            <button 
              onclick="triggerPlayAgain()"
              class="w-full py-4 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-bold text-lg shadow-xl hover:shadow-2xl transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 transition-all"
            >
              <i data-lucide="refresh-cw" class="w-5 h-5"></i> Play Again
            </button>
          </div>
        </div>
      `;
    }

    // Main render function that handles routing
    function renderApp() {
      const root = document.getElementById('root');
      
      if (gameState === 'SETUP') {
        root.innerHTML = renderSetup();
      } else if (gameState === 'COUNTDOWN') {
        root.innerHTML = renderCountdown();
      } else if (gameState === 'PLAYING' || gameState === 'PAUSED') {
        root.innerHTML = renderPlaying();
      } else if (gameState === 'END') {
        root.innerHTML = renderEnd();
      }

      // Initialize Lucide icons on newly injected HTML
      lucide.createIcons();
      
      // Parse the root element to convert native emojis into standardized Twemoji images
      twemoji.parse(root, {
        folder: 'svg',
        ext: '.svg'
      });
    }

    // Initial render when the page loads
    window.onload = renderApp;
  </script>
</body>
</html>
