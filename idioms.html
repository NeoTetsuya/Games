<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess The Idiom</title>
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Load Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Load Twemoji for consistent cross-platform emojis -->
  <script src="https://unpkg.com/twemoji@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
  
  <style>
    /* Custom Animations that were handled by 'animate-in' tailwind plugins in React */
    @keyframes slideInFromBottom {
      from { transform: translateY(1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideInFromTop {
      from { transform: translateY(-1rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes zoomIn {
      from { transform: scale(0.95); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .animate-slide-in-bottom { animation: slideInFromBottom 0.3s ease-out forwards; }
    .animate-slide-in-top { animation: slideInFromTop 0.3s ease-out forwards; }
    .animate-zoom-in { animation: zoomIn 0.3s ease-out forwards; }
    .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    
    /* Ensure Twemoji images scale correctly with text size */
    img.emoji {
      height: 1em;
      width: 1em;
      margin: 0 .05em 0 .1em;
      vertical-align: -0.1em;
      display: inline-block;
      pointer-events: none;
    }
  </style>
</head>
<body class="font-sans text-gray-800 bg-gray-50 min-h-screen flex flex-col">
  <div id="root" class="flex-1 flex flex-col"></div>

  <script>
    // --- DATA: 81 Common Idioms ---
    const IDIOMS_DATA = [
      { idiom: "Piece of cake", meaning: "A task that is very easy to complete.", emojis: "🧩 🍰", clue: "A slice of baked dessert." },
      { idiom: "Over the moon", meaning: "Extremely happy and delighted.", emojis: "⤴️ 🌕", clue: "Above the lunar sphere." },
      { idiom: "Under the weather", meaning: "Feeling slightly unwell or sick.", emojis: "👇 ⛅", clue: "Beneath the meteorological conditions." },
      { idiom: "Cost an arm and a leg", meaning: "To be extremely expensive.", emojis: "💲 💪 ➕ 🦵", clue: "Priced at two human limbs." },
      { idiom: "Once in a blue moon", meaning: "Happening very rarely.", emojis: "1️⃣ 📥 🔵 🌕", clue: "Single time inside an azure lunar event." },
      { idiom: "Break the ice", meaning: "To relieve tension in a new social situation.", emojis: "🔨 🧊", clue: "Shatter the frozen water." },
      { idiom: "Time is money", meaning: "Time is a valuable resource.", emojis: "⏱️ 🟰 💵", clue: "Chronology equals currency." },
      { idiom: "Couch potato", meaning: "A lazy person who watches too much television.", emojis: "🛋️ 🥔", clue: "Sofa spud." },
      { idiom: "Early bird", meaning: "A person who wakes up or arrives early.", emojis: "🌅 🐦", clue: "Premature fowl." },
      { idiom: "Night owl", meaning: "A person who is active late at night.", emojis: "🌃 🦉", clue: "Evening nocturnal bird." },
      { idiom: "Bookworm", meaning: "Someone who loves to read books.", emojis: "📚 🐛", clue: "Literature insect." },
      { idiom: "Black sheep", meaning: "A person who is different from the rest of their family.", emojis: "⬛ 🐑", clue: "Dark-colored woolly animal." },
      { idiom: "Out of the blue", meaning: "Happening unexpectedly without warning.", emojis: "📤 🔵", clue: "Emerging from the azure." },
      { idiom: "In a nutshell", meaning: "In the fewest possible words; in summary.", emojis: "📥 🥜 🐚", clue: "Inside a hard seed casing." },
      { idiom: "Bear in mind", meaning: "To remember or consider something.", emojis: "🐻 📥 🧠", clue: "Large furry mammal inside the brain." },
      { idiom: "Walk in the park", meaning: "Something that is very easy to do.", emojis: "🚶 📥 🏞️", clue: "Stroll inside a public garden." },
      { idiom: "Down to earth", meaning: "Practical, reasonable, and friendly.", emojis: "👇 2️⃣ 🌎", clue: "Below toward the planet." },
      { idiom: "Music to my ears", meaning: "Good news or information you are glad to hear.", emojis: "🎵 2️⃣ 👂", clue: "Melodies directed at the hearing organs." },
      { idiom: "Miss the boat", meaning: "To be too late to take advantage of an opportunity.", emojis: "❌ ⛵", clue: "Fail to catch the watercraft." },
      { idiom: "Fish out of water", meaning: "Feeling uncomfortable in an unfamiliar situation.", emojis: "🐟 📤 💧", clue: "Aquatic creature removed from liquid." },
      { idiom: "See eye to eye", meaning: "To completely agree with someone.", emojis: "👀 👁️ 2️⃣ 👁️", clue: "View pupil toward pupil." },
      { idiom: "Turn a blind eye", meaning: "To pretend not to notice something bad.", emojis: "🔄 🕶️ 👁️", clue: "Rotate a sightless pupil." },
      { idiom: "Off the top of my head", meaning: "Saying something from memory without checking facts.", emojis: "📴 🔝 👤", clue: "Deactivated peak of the cranium." },
      { idiom: "Heart of gold", meaning: "Having a very kind and generous nature.", emojis: "💛 🪙", clue: "Pumping organ made of precious metal." },
      { idiom: "Apple of my eye", meaning: "Someone who is cherished above all others.", emojis: "🍎 👁️", clue: "Red fruit belonging to my vision." },
      { idiom: "Cold feet", meaning: "Loss of nerve or confidence before doing something.", emojis: "🥶 🦶", clue: "Freezing lower extremities." },
      { idiom: "Give a hand", meaning: "To help someone with a task.", emojis: "🤲 ✋", clue: "Donate a five-fingered appendage." },
      { idiom: "Two peas in a pod", meaning: "Two people who are very similar in appearance or character.", emojis: "2️⃣ 🫛 📥 🫛", clue: "Pair of green seeds inside a casing." },
      { idiom: "Spill the beans", meaning: "To reveal a secret.", emojis: "🫗 🫘", clue: "Pour out the legumes." },
      { idiom: "Cash cow", meaning: "A product or business that generates a steady profit.", emojis: "💵 🐄", clue: "Currency-producing livestock." },
      { idiom: "Hit the roof", meaning: "To become extremely angry.", emojis: "👊 🏠", clue: "Strike the top of a house." },
      { idiom: "Face the music", meaning: "To accept the unpleasant consequences of one's actions.", emojis: "👱‍♂️ 🎵", clue: "Front of the head observing the melodies." },
      { idiom: "Ring a bell", meaning: "To sound familiar or spark a memory.", emojis: "💍 🔔", clue: "Jewelry band and a chiming object." },
      { idiom: "Rule of thumb", meaning: "A general, practical rule rather than an exact scientific one.", emojis: "📏 👍", clue: "Measurement using the thickest digit." },
      { idiom: "Hot potato", meaning: "A controversial issue that is awkward to deal with.", emojis: "🔥 🥔", clue: "Burning root vegetable." },
      { idiom: "Behind closed doors", meaning: "Taking place secretly or privately.", emojis: "😶‍🌫️ 🔒 🚪", clue: "Face hidden in clouds, locked entryway." },
      { idiom: "Out of this world", meaning: "Extremely impressive or excellent.", emojis: "📤 🌎", clue: "Exiting our planet." },
      { idiom: "Keep an eye on", meaning: "To watch someone or something carefully.", emojis: "✊ 👁️ 🔛", clue: "Hold a pupil atop." },
      { idiom: "On cloud nine", meaning: "In a state of extreme happiness.", emojis: "🔛 ☁️ 9️⃣", clue: "Atop the ninth cumulus." },
      { idiom: "Tie the knot", meaning: "To get married.", emojis: "🎀 🪢", clue: "Fasten the connection." },
      { idiom: "Rain or shine", meaning: "Whatever happens; no matter the weather.", emojis: "🌧️ ⚖️ ☀️", clue: "Precipitation or sunlight." },
      { idiom: "Drop in the ocean", meaning: "A very small amount compared to what is needed.", emojis: "💧 📥 🌊", clue: "One water bead inside a vast sea." },
      { idiom: "Bite your tongue", meaning: "To stop yourself from saying something.", emojis: "🫦 🫵 👅", clue: "Chew your tasting organ." },
      { idiom: "Burn bridges", meaning: "To destroy relationships permanently.", emojis: "🔥 🌉", clue: "Ignite overpass structures." },
      { idiom: "Cut to the chase", meaning: "To get straight to the main point.", emojis: "✂️ 2️⃣ 🏃", clue: "Slice toward the pursuit." },
      { idiom: "Silver lining", meaning: "A positive aspect in a bad situation.", emojis: "🥈 ➖", clue: "Precious gray metal stripe." },
      { idiom: "Rock the boat", meaning: "To cause trouble or disrupt a stable situation.", emojis: "🪨 ⛵", clue: "Stone the small ship." },
      { idiom: "Jump ship", meaning: "To abandon a difficult situation.", emojis: "🤾‍♂️ 🚢", clue: "Leap from the large watercraft." },
      { idiom: "Green with envy", meaning: "Very jealous.", emojis: "🟢 ➕ 😒", clue: "Emerald colored plus jealousy." },
      { idiom: "On the fence", meaning: "Undecided about something.", emojis: "🔛 🚧", clue: "Atop the wooden barrier." },
      { idiom: "Under the sun", meaning: "Everything that exists or is possible.", emojis: "👇 ☀️", clue: "Beneath the bright star." },
      { idiom: "Draw the line", meaning: "To set a limit on what you will accept.", emojis: "🖍️ ➖", clue: "Sketch the straight mark." },
      { idiom: "Hit the road", meaning: "To leave or begin a journey.", emojis: "👊 🛣️", clue: "Strike the paved highway." },
      { idiom: "Water under the bridge", meaning: "Past problems that are forgiven and forgotten.", emojis: "💧 👇 🌉", clue: "Liquid beneath the overpass." },
      { idiom: "Call it a day", meaning: "To stop working on something.", emojis: "📞 ☀️", clue: "Telephone the daylight." },
      { idiom: "Top of the world", meaning: "Feeling extremely happy and successful.", emojis: "🔝 🌎", clue: "Peak of the planet." },
      { idiom: "See the light", meaning: "To suddenly understand something.", emojis: "👀 💡", clue: "View the illumination." },
      { idiom: "Go with the flow", meaning: "To be relaxed and accept a situation.", emojis: "🚶 ➕ 🌊", clue: "Walk alongside the current." },
      { idiom: "Break new ground", meaning: "To do something innovative.", emojis: "🔨 🆕 🌍", clue: "Shatter fresh terrain." },
      { idiom: "Out of the box", meaning: "Creative and non-traditional thinking.", emojis: "📤 📦", clue: "Exiting the cardboard container." },
      { idiom: "Butterflies in my stomach", meaning: "Feeling very nervous before doing something.", emojis: "🦋 🦋 📥 🤰", clue: "Flying insects inside a belly." },
      { idiom: "My mind went blank", meaning: "To suddenly forget everything.", emojis: "🧠 🚶 ⬜", clue: "Brain walked to an empty space." },
      { idiom: "On the tip of my tongue", meaning: "Almost remembering something, but not quite.", emojis: "🔛 🔝 📴 👅", clue: "Atop the peak of the tasting organ." },
      { idiom: "Lost my train of thought", meaning: "To forget what you were just thinking or talking about.", emojis: "🤷 🚂 📴 💭", clue: "Misplaced the locomotive of ideas." },
      { idiom: "Cross my mind", meaning: "To briefly think of something.", emojis: "❌ 👤 🧠", clue: "Intersect the cranium." },
      { idiom: "Change of heart", meaning: "A change in one's opinion or feelings.", emojis: "🔄 📴 💛", clue: "Rotation of the pumping organ." },
      { idiom: "Hit the spot", meaning: "Exactly what was needed (often for food or drink).", emojis: "👊 🎯", clue: "Strike the circular target." },
      { idiom: "Hit the jackpot", meaning: "To make a lot of money or have great luck.", emojis: "👊 🎰", clue: "Strike the slot machine prize." },
      { idiom: "Hit the wall", meaning: "To reach a point where you cannot continue.", emojis: "👊 🧱", clue: "Strike the wall." },
      { idiom: "Hit the sack", meaning: "To go to bed.", emojis: "👊 🛏️", clue: "Strike the bed." },
      { idiom: "The ball is in your court", meaning: "It is your turn to make a decision or take action.", emojis: "🎾 📥 🫵 🏟️", clue: "Sphere inside your playing area." },
      { idiom: "It's a blessing in disguise", meaning: "A good thing that seemed bad at first.", emojis: "👼 📥 🥸", clue: "Holy favor inside a costume." },
      { idiom: "Jump on the bandwagon", meaning: "To join an activity that has become very popular.", emojis: "🤾‍♂️ 🔛 🎺 🚐", clue: "Leap atop the musical vehicle." },
      { idiom: "Actions speak louder than words", meaning: "What you do is more important than what you say.", emojis: "🎬 🗣️ 🔊 💬", clue: "Deeds talk noisier compared to speech." },
      { idiom: "Bury the hatchet", meaning: "To make peace and stop an argument.", emojis: "🪦 🪓", clue: "Tomb the small axe." },
      { idiom: "Take it with a grain of salt", meaning: "To not take something too seriously or to be skeptical.", emojis: "🤲 🌾 🧂", clue: "Accept with a speck of sodium." },
      { idiom: "Kill two birds with one stone", meaning: "To achieve two things with a single action.", emojis: "☠️ 2️⃣ 🐦 1️⃣ 🪨", clue: "Terminate a pair of fowls using a single rock." },
      { idiom: "I smell a rat", meaning: "To suspect that something is wrong or dishonest.", emojis: "👁️ 👃 🐀", clue: "My visual organ detects scent of a rodent." },
      { idiom: "As solid as a rock", meaning: "Very dependable or strong.", emojis: "🧱 🟰 🪨", clue: "Firm like a stone." },
      { idiom: "Pass with flying colors", meaning: "To pass a test or achieve something with high success.", emojis: "🎫 ✈️ 🎨", clue: "An admittance ticket, airborne, and art pigments." },
      { idiom: "Kick the bucket", meaning: "To pass away or die.", emojis: "🦵 🪣", clue: "Strike the pail with a foot." }
    ];

    // Helper to shuffle array (Fisher-Yates)
    const shuffleArray = (array) => {
      const newArr = [...array];
      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }
      return newArr;
    };

    // --- STATE VARIABLES ---
    let gameState = 'SETUP'; // SETUP, PLAYING, END
    let teamA = 'Team A';
    let teamB = 'Team B';
    let rounds = 5;
    let scoreA = 0;
    let scoreB = 0;
    let currentTurn = 'A'; // 'A' or 'B'
    let questions = [];
    let currentQuestionIndex = 0;
    let showHint = false;
    let showAnswer = false;

    // --- ACTIONS ---
    function triggerStartGame() {
      // Read values from inputs
      teamA = document.getElementById('teamAInput').value || 'Team A';
      teamB = document.getElementById('teamBInput').value || 'Team B';
      rounds = parseInt(document.getElementById('roundsSelect').value) || 5;

      // We need 2 questions per round (one for each team)
      const totalQuestionsNeeded = rounds * 2;
      questions = shuffleArray(IDIOMS_DATA).slice(0, totalQuestionsNeeded);
      
      scoreA = 0;
      scoreB = 0;
      currentTurn = 'A';
      currentQuestionIndex = 0;
      showHint = false;
      showAnswer = false;
      gameState = 'PLAYING';
      
      renderApp();
    }

    function triggerShowHint() {
      showHint = true;
      renderApp();
    }

    function triggerShowAnswer() {
      showAnswer = true;
      renderApp();
    }

    function handleScore(isCorrect) {
      if (isCorrect) {
        if (currentTurn === 'A') scoreA += 1;
        if (currentTurn === 'B') scoreB += 1;
      }

      const nextIndex = currentQuestionIndex + 1;
      
      if (nextIndex >= questions.length) {
        gameState = 'END';
      } else {
        currentQuestionIndex = nextIndex;
        currentTurn = currentTurn === 'A' ? 'B' : 'A';
        showHint = false;
        showAnswer = false;
      }
      renderApp();
    }

    function triggerPlayAgain() {
      gameState = 'SETUP';
      renderApp();
    }
    
    function triggerEndGameEarly() {
      if(confirm("Are you sure you want to end the game early?")) {
          gameState = 'END';
          renderApp();
      }
    }

    // --- RENDER FUNCTIONS ---
    function renderSetup() {
      return `
        <div class="flex-1 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
          <div class="bg-white/95 backdrop-blur rounded-3xl shadow-2xl p-8 w-full max-w-lg animate-zoom-in">
            <div class="text-center mb-8">
              <h1 class="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-pink-600 mb-2 drop-shadow-sm">
                Guess The Idiom
              </h1>
              <p class="text-gray-500 font-medium">The visual phrase-guessing party game!</p>
            </div>

            <div class="space-y-6">
              <div class="space-y-4">
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="teamAInput">Team 1 Name</label>
                  <input 
                    id="teamAInput"
                    type="text" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none transition-all shadow-sm"
                    value="${teamA}"
                    maxlength="20"
                    onkeypress="if(event.key === 'Enter') triggerStartGame()"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="teamBInput">Team 2 Name</label>
                  <input 
                    id="teamBInput"
                    type="text" 
                    class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none transition-all shadow-sm"
                    value="${teamB}"
                    maxlength="20"
                    onkeypress="if(event.key === 'Enter') triggerStartGame()"
                  />
                </div>
                <div>
                  <label class="block text-sm font-semibold text-gray-700 mb-1" for="roundsSelect">Rounds per Team</label>
                  <div class="relative">
                    <select 
                      id="roundsSelect"
                      class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-purple-400 outline-none appearance-none cursor-pointer shadow-sm bg-white"
                    >
                      <option value="3" ${rounds === 3 ? 'selected' : ''}>3 Rounds (Short)</option>
                      <option value="5" ${rounds === 5 ? 'selected' : ''}>5 Rounds (Normal)</option>
                      <option value="10" ${rounds === 10 ? 'selected' : ''}>10 Rounds (Long)</option>
                      <option value="20" ${rounds === 20 ? 'selected' : ''}>20 Rounds (40 Idioms)</option>
                      <option value="40" ${rounds === 40 ? 'selected' : ''}>40 Rounds (80 Idioms!)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                      <i data-lucide="chevron-down" class="w-4 h-4"></i>
                    </div>
                  </div>
                </div>
              </div>

              <button 
                onclick="triggerStartGame()"
                class="w-full py-4 bg-gradient-to-r from-indigo-600 to-pink-600 hover:from-indigo-700 hover:to-pink-700 text-white rounded-xl font-bold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2"
              >
                Start Game <i data-lucide="play" class="w-5 h-5 fill-current"></i>
              </button>
            </div>
          </div>
        </div>
      `;
    }

    function renderPlaying() {
      const currentQ = questions[currentQuestionIndex];
      const activeTeamName = currentTurn === 'A' ? teamA : teamB;
      const isTeamA = currentTurn === 'A';

      // Convert the idiom into blanks (e.g. "Piece of cake" -> "_ _ _ _ _   _ _   _ _ _ _")
      // We replace all letters with underscores, keeping spaces and punctuation intact
      const blanks = currentQ.idiom.replace(/[a-zA-Z]/g, '_');

      return `
        <div class="flex-1 flex flex-col font-sans text-gray-800">
          <!-- Header Scoreboard -->
          <header class="bg-white shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-10">
            <!-- Team A Score -->
            <div class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all duration-300 ${currentTurn === 'A' ? 'bg-indigo-50 ring-2 ring-indigo-400 scale-105 shadow-sm' : 'bg-transparent'}">
              <div class="w-10 h-10 rounded-full ${currentTurn === 'A' ? 'bg-indigo-600' : 'bg-indigo-400'} text-white flex items-center justify-center font-bold text-xl shadow-inner transition-colors">
                ${scoreA}
              </div>
              <span class="font-bold ${currentTurn === 'A' ? 'text-indigo-900' : 'text-gray-500'} hidden sm:block truncate max-w-[120px]">${teamA}</span>
            </div>
            
            <!-- Game Info -->
            <div class="flex flex-col items-center flex-1 mx-2">
              <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-0.5">Question</span>
              <span class="text-lg font-black text-gray-800 bg-gray-100 px-3 rounded-full">${currentQuestionIndex + 1} / ${questions.length}</span>
            </div>

            <!-- Team B Score -->
            <div class="flex items-center gap-3 px-3 py-2 rounded-xl transition-all duration-300 ${currentTurn === 'B' ? 'bg-pink-50 ring-2 ring-pink-400 scale-105 shadow-sm' : 'bg-transparent'}">
              <span class="font-bold ${currentTurn === 'B' ? 'text-pink-900' : 'text-gray-500'} hidden sm:block truncate max-w-[120px] text-right">${teamB}</span>
              <div class="w-10 h-10 rounded-full ${currentTurn === 'B' ? 'bg-pink-600' : 'bg-pink-400'} text-white flex items-center justify-center font-bold text-xl shadow-inner transition-colors">
                ${scoreB}
              </div>
            </div>
            
            <!-- End Game Button -->
            <button onclick="triggerEndGameEarly()" title="End game early" aria-label="End Game" class="ml-2 sm:ml-4 p-2 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-colors">
                <i data-lucide="power" class="w-5 h-5"></i>
            </button>
          </header>

          <!-- Main Game Area -->
          <main class="flex-1 w-full max-w-4xl mx-auto p-4 md:p-8 flex flex-col justify-center">
            <div class="text-center mb-6 animate-fade-in">
              <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full text-sm font-bold mb-3 shadow-sm ${isTeamA ? 'bg-indigo-100 text-indigo-700' : 'bg-pink-100 text-pink-700'}">
                <i data-lucide="users" class="w-4 h-4"></i> ${activeTeamName}'s Turn
              </div>
              <h2 class="text-2xl md:text-3xl font-black text-gray-800">Guess the Idiom!</h2>
            </div>

            <!-- Puzzle Card -->
            <div class="bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] overflow-hidden mb-6 border border-gray-100 flex-1 flex flex-col relative animate-zoom-in min-h-[400px]">
              <div class="relative w-full flex-1 flex flex-col items-center justify-center overflow-hidden p-8 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-50 via-gray-50 to-slate-100">
                
                <!-- Emoji Display -->
                <div class="text-7xl md:text-9xl tracking-[0.1em] md:tracking-[0.2em] drop-shadow-lg mb-10 animate-float select-none cursor-default z-10">
                  ${currentQ.emojis}
                </div>

                <!-- Word Blanks Hint -->
                <div class="bg-white/80 backdrop-blur px-8 py-4 rounded-2xl shadow-sm border border-gray-100 z-10">
                    <div class="text-2xl md:text-4xl font-mono font-bold text-gray-600 tracking-[0.2em] md:tracking-[0.4em] text-center select-none">
                      ${blanks}
                    </div>
                </div>
                
                <!-- Overlay Literal Text Hint if activated -->
                ${showHint ? `
                  <div class="absolute inset-x-0 bottom-0 bg-white/95 backdrop-blur-md border-t border-indigo-100 p-6 md:p-8 text-center animate-slide-in-bottom z-30 shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
                    <p class="text-indigo-600 text-sm font-bold uppercase tracking-widest mb-3">Literal Meaning Hint</p>
                    <div class="text-xl md:text-3xl font-bold text-gray-800 italic">"${currentQ.clue}"</div>
                  </div>
                ` : ''}
              </div>

              <!-- Action Bar -->
              <div class="p-4 md:p-6 bg-white border-t border-gray-100 flex flex-col sm:flex-row gap-4 justify-between items-center z-40 bg-gray-50/50">
                ${!showHint && !showAnswer ? `
                  <button 
                    onclick="triggerShowHint()"
                    class="w-full sm:w-auto px-6 py-3 rounded-xl font-bold text-gray-700 bg-white border border-gray-200 hover:bg-gray-50 hover:border-gray-300 shadow-sm transform active:scale-95 transition-all flex items-center justify-center gap-2"
                  >
                    <i data-lucide="help-circle" class="w-5 h-5 text-indigo-500"></i> Need a hint?
                  </button>
                ` : `
                  <div class="hidden sm:block"></div>
                `}

                ${!showAnswer ? `
                  <button 
                    onclick="triggerShowAnswer()"
                    class="w-full sm:w-auto px-8 py-3 rounded-xl font-bold text-white shadow-lg transform hover:-translate-y-1 active:scale-95 transition-all flex items-center justify-center gap-2 ${isTeamA ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200' : 'bg-pink-600 hover:bg-pink-700 shadow-pink-200'}"
                  >
                    <i data-lucide="eye" class="w-5 h-5"></i> Reveal Answer
                  </button>
                ` : ''}
              </div>
            </div>

            <!-- Answer Reveal Area -->
            ${showAnswer ? `
              <div class="bg-white rounded-3xl shadow-xl p-6 border border-gray-100 animate-slide-in-top animate-fade-in relative overflow-hidden">
                <div class="absolute top-0 inset-x-0 h-1 bg-gradient-to-r ${isTeamA ? 'from-indigo-400 to-indigo-600' : 'from-pink-400 to-pink-600'}"></div>
                
                <div class="text-center mb-6 pt-2">
                  <h3 class="text-sm font-bold text-green-500 uppercase tracking-widest mb-2">Answer</h3>
                  <p class="text-3xl md:text-4xl font-black text-gray-800 mb-3">${currentQ.idiom}</p>
                  <div class="flex items-center justify-center gap-3 text-gray-600 bg-gray-50 border border-gray-100 rounded-xl p-4">
                    <i data-lucide="info" class="w-5 h-5 shrink-0 text-blue-500"></i>
                    <p class="text-sm md:text-base text-left font-medium">${currentQ.meaning}</p>
                  </div>
                </div>

                <div class="border-t border-gray-100 pt-6">
                  <p class="text-center text-gray-600 font-semibold mb-4">Did ${activeTeamName} guess it correctly?</p>
                  <div class="grid grid-cols-2 gap-4">
                    <button 
                      onclick="handleScore(false)"
                      class="py-4 rounded-xl font-bold text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 transform active:scale-95 transition-all flex items-center justify-center gap-2"
                    >
                      <i data-lucide="x" class="w-6 h-6"></i> Nope (0)
                    </button>
                    <button 
                      onclick="handleScore(true)"
                      class="py-4 rounded-xl font-bold text-green-700 bg-green-100 hover:bg-green-200 border border-green-300 transform hover:-translate-y-1 hover:shadow-lg active:scale-95 transition-all flex items-center justify-center gap-2 shadow-sm"
                    >
                      <i data-lucide="check" class="w-6 h-6"></i> Correct! (+1)
                    </button>
                  </div>
                </div>
              </div>
            ` : ''}
          </main>
        </div>
      `;
    }

    function renderEnd() {
      const isTie = scoreA === scoreB;
      const winner = scoreA > scoreB ? teamA : teamB;
      
      return `
        <div class="flex-1 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
          <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-lg text-center animate-zoom-in duration-300">
            <div class="relative inline-block mb-6">
                <i data-lucide="trophy" class="w-24 h-24 relative z-10 ${isTie ? 'text-gray-400' : 'text-yellow-400'}"></i>
                <div class="absolute inset-0 bg-yellow-100 blur-2xl rounded-full z-0 ${isTie ? 'hidden' : ''}"></div>
            </div>
            
            <h2 class="text-5xl font-black text-gray-800 mb-2">
              ${isTie ? "It's a Tie!" : `${winner} Wins!`}
            </h2>
            <p class="text-xl text-gray-500 mb-8 font-medium">What a fantastic game!</p>

            <div class="grid grid-cols-2 gap-4 mb-8">
              <div class="p-6 rounded-2xl ${scoreA >= scoreB && !isTie ? 'bg-indigo-50 border-2 border-indigo-300 shadow-inner' : 'bg-gray-50 border border-gray-100'} transition-all">
                <div class="text-indigo-600 font-bold truncate text-lg">${teamA}</div>
                <div class="text-5xl font-black text-gray-800 mt-2 mb-1">${scoreA}</div>
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-widest">Points</div>
              </div>
              <div class="p-6 rounded-2xl ${scoreB >= scoreA && !isTie ? 'bg-pink-50 border-2 border-pink-300 shadow-inner' : 'bg-gray-50 border border-gray-100'} transition-all">
                <div class="text-pink-600 font-bold truncate text-lg">${teamB}</div>
                <div class="text-5xl font-black text-gray-800 mt-2 mb-1">${scoreB}</div>
                <div class="text-sm font-semibold text-gray-400 uppercase tracking-widest">Points</div>
              </div>
            </div>

            <button 
              onclick="triggerPlayAgain()"
              class="w-full py-4 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-bold text-lg shadow-xl hover:shadow-2xl transform hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-2 transition-all"
            >
              <i data-lucide="refresh-cw" class="w-5 h-5"></i> Play Again
            </button>
          </div>
        </div>
      `;
    }

    // Main render function that handles routing
    function renderApp() {
      const root = document.getElementById('root');
      
      if (gameState === 'SETUP') {
        root.innerHTML = renderSetup();
      } else if (gameState === 'PLAYING') {
        root.innerHTML = renderPlaying();
      } else if (gameState === 'END') {
        root.innerHTML = renderEnd();
      }

      // Initialize Lucide icons on newly injected HTML
      lucide.createIcons();
      
      // Parse the root element to convert native emojis into standardized Twemoji images
      twemoji.parse(root, {
        folder: 'svg',
        ext: '.svg'
      });
    }

    // Initial render when the page loads
    window.onload = renderApp;
  </script>
</body>
</html>
