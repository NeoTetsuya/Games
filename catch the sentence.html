<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catch The Sentence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Decorative Spiral Background Animation */
    @keyframes spin-slow {
      100% { transform: rotate(360deg); }
    }
    .animate-spiral {
      transform-origin: 50px 50px;
      animation: spin-slow 60s linear infinite;
    }

    /* General Fade In */
    @keyframes fade-in {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fade-in 0.4s ease-out forwards;
    }

    /* --- Level 3: Spinning Words --- */
    @keyframes spin-word {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .level-3-anim {
      animation: spin-word 2.5s linear infinite;
    }

    /* --- Level 4: Flying Sentences Across the Screen --- */
    @keyframes fly-by-tl-br {
      0% { transform: translate(-150vw, -150vh) scale(0.8); }
      100% { transform: translate(150vw, 150vh) scale(1.4); }
    }
    @keyframes fly-by-tr-bl {
      0% { transform: translate(150vw, -150vh) scale(1.4); }
      100% { transform: translate(-150vw, 150vh) scale(0.8); }
    }
    @keyframes fly-by-bl-tr {
      0% { transform: translate(-150vw, 150vh) scale(1.2); }
      100% { transform: translate(150vw, -150vh) scale(1.2); }
    }
    .level-4-anim-0 { animation: fly-by-tl-br 2.8s linear forwards; }
    .level-4-anim-1 { animation: fly-by-tr-bl 2.8s linear forwards; }
    .level-4-anim-2 { animation: fly-by-bl-tr 2.8s linear forwards; }

    /* --- Level 5: Flying Words Across --- */
    @keyframes fly-word-0 {
      0% { transform: translate(-150vw, -50vh) scale(0.8) rotate(-10deg); }
      100% { transform: translate(150vw, 50vh) scale(1.2) rotate(20deg); }
    }
    @keyframes fly-word-1 {
      0% { transform: translate(150vw, -20vh) scale(1.1) rotate(15deg); }
      100% { transform: translate(-150vw, 20vh) scale(0.9) rotate(-15deg); }
    }
    @keyframes fly-word-2 {
      0% { transform: translate(-50vw, 150vh) scale(0.9) rotate(-20deg); }
      100% { transform: translate(50vw, -150vh) scale(1.1) rotate(10deg); }
    }
    @keyframes fly-word-3 {
      0% { transform: translate(150vw, 100vh) scale(1) rotate(5deg); }
      100% { transform: translate(-150vw, -100vh) scale(1) rotate(-5deg); }
    }
    .level-5-anim-0 { animation: fly-word-0 4.2s linear both; }
    .level-5-anim-1 { animation: fly-word-1 3.8s linear both; }
    .level-5-anim-2 { animation: fly-word-2 4.5s linear both; }
    .level-5-anim-3 { animation: fly-word-3 3.9s linear both; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-900 via-purple-800 to-violet-900 flex flex-col items-center justify-center p-4 md:p-8 overflow-hidden font-sans relative selection:bg-pink-500 selection:text-white text-gray-900">

  <!-- Spiral Background -->
  <svg class="absolute inset-0 w-full h-full opacity-10 pointer-events-none z-0" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
    <g class="animate-spiral" fill="none" stroke="black" stroke-width="1.5">
      <path d="M 50 50 m 0 0 a 0,0 0 1,0 0,0 a 0,0 0 1,0 0,0" />
      <path d="M 50 50 m -5 0 a 5,5 0 1,0 10,0 a 5,5 0 1,0 -10,0" />
      <path d="M 50 50 m -10 0 a 10,10 0 1,0 20,0 a 10,10 0 1,0 -20,0" />
      <path d="M 50 50 m -15 0 a 15,15 0 1,0 30,0 a 15,15 0 1,0 -30,0" />
      <path d="M 50 50 m -20 0 a 20,20 0 1,0 40,0 a 20,20 0 1,0 -40,0" />
      <path d="M 50 50 m -25 0 a 25,25 0 1,0 50,0 a 25,25 0 1,0 -50,0" />
      <path d="M 50 50 m -30 0 a 30,30 0 1,0 60,0 a 30,30 0 1,0 -60,0" />
      <path d="M 50 50 m -35 0 a 35,35 0 1,0 70,0 a 35,35 0 1,0 -70,0" />
      <path d="M 50 50 m -40 0 a 40,40 0 1,0 80,0 a 40,40 0 1,0 -80,0" />
      <path d="M 50 50 m -45 0 a 45,45 0 1,0 90,0 a 45,45 0 1,0 -90,0" />
      <path d="M 50 50 m -50 0 a 50,50 0 1,0 100,0 a 50,50 0 1,0 -100,0" />
      <path d="M 50 50 m -55 0 a 55,55 0 1,0 110,0 a 55,55 0 1,0 -110,0" />
      <path d="M 50 50 m -60 0 a 60,60 0 1,0 120,0 a 60,60 0 1,0 -120,0" />
      <path d="M 50 50 m -65 0 a 65,65 0 1,0 130,0 a 65,65 0 1,0 -130,0" />
      <path d="M 50 50 m -70 0 a 70,70 0 1,0 140,0 a 70,70 0 1,0 -140,0" />
    </g>
  </svg>

  <!-- App Root -->
  <div id="app-root" class="z-10 relative w-full flex flex-col items-center justify-center"></div>

  <!-- Persistent Progress HUD Container -->
  <div id="hud-container" class="absolute top-6 left-6 right-6 flex justify-between items-start text-white/90 font-bold z-0 pointer-events-none hidden"></div>

  <script>
    // --- Game Data ---
    const GAME_LEVELS = [
      {
        level: 1,
        description: "Sentences will appear quickly and then disappear. Read carefully!",
        questions: [
          { text: "She always makes breakfast for her sister.", type: "sentence" },
          { text: "We usually catch the bus at 8 a.m.", type: "sentence" },
          { text: "He never tidies his bedroom on weekdays.", type: "sentence" }
        ]
      },
      {
        level: 2,
        description: "Words will appear scattered. Read them all before they vanish!",
        questions: [
          { text: "They usually watch TV after dinner.", type: "words", words: ["They", "usually", "watch", "TV", "after", "dinner."] },
          { text: "He sometimes takes the rubbish out.", type: "words", words: ["He", "sometimes", "takes", "the", "rubbish", "out."] },
          { text: "She always goes to bed early.", type: "words", words: ["She", "always", "goes", "to", "bed", "early."] }
        ]
      },
      {
        level: 3,
        description: "More scattered words! Catch them quickly.",
        questions: [
          { text: "Our teacher never gives us homework on Fridays.", type: "words", words: ["Our teacher", "never", "gives us", "homework", "on Fridays."] },
          { text: "We sometimes relax and play video games.", type: "words", words: ["We", "sometimes", "relax", "and play", "video games."] },
          { text: "My sister usually brushes her teeth before bed.", type: "words", words: ["My sister", "usually", "brushes", "her teeth", "before bed."] }
        ]
      },
      {
        level: 4,
        description: "Back to full sentences. Get ready!",
        questions: [
          { text: "My grandparents often walk in the park.", type: "sentence" },
          { text: "He always finishes his work at five o'clock.", type: "sentence" },
          { text: "We sometimes meet our friends for coffee.", type: "sentence" }
        ]
      },
      {
        level: 5,
        description: "Final Challenge! Long scattered sentences.",
        questions: [
          { text: "I usually have a big breakfast in the morning.", type: "words", words: ["I", "usually", "have", "a big", "breakfast", "in the", "morning."] },
          { text: "She almost never falls asleep before midnight.", type: "words", words: ["She", "almost", "never", "falls", "asleep", "before", "midnight."] },
          { text: "My brothers always do the washing up after lunch.", type: "words", words: ["My brothers", "always", "do", "the", "washing up", "after", "lunch."] }
        ]
      }
    ];

    // --- State ---
    let gameState = 'START';
    let currentLevelIndex = 0;
    let currentQuestionIndex = 0;
    let timeLeft = 100;
    let teamCount = 2;
    let teams = [];
    let roundWinners = new Set();
    let timerId = null;
    let intervalId = null;
    let randomizedWords = [];

    // Elements
    const root = document.getElementById('app-root');
    const hud = document.getElementById('hud-container');

    // --- Core Logic ---
    function setGameState(newState) {
      clearTimeout(timerId);
      clearInterval(intervalId);
      gameState = newState;
      
      const currentLevel = GAME_LEVELS[currentLevelIndex];
      const currentQuestion = currentLevel?.questions[currentQuestionIndex];

      if (gameState === 'SHOWING' && currentQuestion?.type === 'words') {
        prepareRandomizedWords(currentQuestion.words);
      }

      render();

      // State side-effects (Timers)
      if (gameState === 'LEVEL_TRANSITION') {
        timerId = setTimeout(() => {
          setGameState('SHOWING');
        }, 3000);
      } else if (gameState === 'SHOWING') {
        timeLeft = 100;
        const duration = currentQuestion.type === 'words' ? 4500 : 3000;
        const interval = 50;
        const step = (interval / duration) * 100;
        
        intervalId = setInterval(() => {
          timeLeft = Math.max(0, timeLeft - step);
          const timerBar = document.getElementById('timer-bar-fill');
          if (timerBar) timerBar.style.width = `${timeLeft}%`;
        }, interval);

        timerId = setTimeout(() => {
          setGameState('WAITING');
        }, duration);
      }
    }

    function prepareRandomizedWords(words) {
      const cells = Array(12).fill(null);
      const indices = [];
      while(indices.length < words.length) {
        let r = Math.floor(Math.random() * 12);
        if(!indices.includes(r)) indices.push(r);
      }
      words.forEach((w, i) => { cells[indices[i]] = w; });
      randomizedWords = cells;
    }

    // --- Handlers ---
    window.goToSetup = () => setGameState('TEAM_SETUP');
    
    window.changeTeamCount = (delta) => {
      teamCount = Math.max(1, Math.min(10, teamCount + delta));
      render();
    };

    window.startGame = () => {
      teams = Array.from({ length: teamCount }, (_, i) => ({
        id: i,
        name: `Team ${i + 1}`,
        score: 0
      }));
      currentLevelIndex = 0;
      currentQuestionIndex = 0;
      roundWinners.clear();
      setGameState('LEVEL_TRANSITION');
    };

    window.revealAnswer = () => setGameState('REVEAL');
    
    window.handleShowAgain = () => setGameState('SHOWING');
    
    window.toggleWinner = (teamId) => {
      if (roundWinners.has(teamId)) {
        roundWinners.delete(teamId);
      } else {
        roundWinners.add(teamId);
      }
      render(); // Re-render reveal screen to show selections
    };

    window.handleNext = () => {
      // Commit the points
      teams = teams.map(t => ({
        ...t,
        score: t.score + (roundWinners.has(t.id) ? 1 : 0)
      }));
      roundWinners.clear();

      const currentLevel = GAME_LEVELS[currentLevelIndex];
      if (currentQuestionIndex < currentLevel.questions.length - 1) {
        currentQuestionIndex++;
        setGameState('SHOWING');
      } else if (currentLevelIndex < GAME_LEVELS.length - 1) {
        currentLevelIndex++;
        currentQuestionIndex = 0;
        setGameState('LEVEL_TRANSITION');
      } else {
        setGameState('END');
      }
    };

    // --- Rendering ---
    function render() {
      root.innerHTML = ''; // Clear root
      hud.classList.add('hidden'); // Hide HUD by default

      const currentLevel = GAME_LEVELS[currentLevelIndex];
      const currentQuestion = currentLevel?.questions[currentQuestionIndex];

      if (['SHOWING', 'WAITING', 'REVEAL'].includes(gameState)) {
        renderHUD(currentLevel);
      }

      switch (gameState) {
        case 'START':
          root.innerHTML = `
            <div class="text-center space-y-8 animate-fade-in z-10 relative">
              <h1 class="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-pink-300 to-cyan-300 drop-shadow-lg uppercase tracking-wider">
                Catch <br/>The Sentence!
              </h1>
              
              <div class="bg-white/20 backdrop-blur-md border border-white/30 p-8 rounded-3xl shadow-xl max-w-lg mx-auto text-white">
                <h2 class="text-2xl font-bold mb-4 tracking-wide uppercase">How To Play</h2>
                <ul class="text-left space-y-4 text-lg font-medium">
                  <li class="flex items-center"><span class="mr-3 text-2xl">👀</span> Sentences or words will appear then disappear.</li>
                  <li class="flex items-center"><span class="mr-3 text-2xl">⚡</span> Teams must read them quickly before time runs out!</li>
                  <li class="flex items-center"><span class="mr-3 text-2xl">✍️</span> Teams write exactly what they read to score.</li>
                </ul>
              </div>

              <button onclick="goToSetup()" class="px-10 py-4 bg-gradient-to-r from-green-400 to-emerald-600 hover:from-green-500 hover:to-emerald-700 text-white rounded-full text-2xl font-bold shadow-[0_0_20px_rgba(52,211,153,0.5)] transform transition hover:scale-105 active:scale-95">
                START GAME
              </button>
            </div>
          `;
          break;

        case 'TEAM_SETUP':
          root.innerHTML = `
            <div class="text-center animate-fade-in z-10 relative">
              <div class="bg-white p-10 md:p-14 rounded-3xl shadow-2xl max-w-lg mx-auto">
                <h2 class="text-3xl font-extrabold mb-8 text-indigo-900 uppercase tracking-wide">Team Setup</h2>
                <p class="text-gray-500 mb-6 font-medium">How many teams are playing today?</p>
                
                <div class="flex items-center justify-center space-x-6 mb-10">
                  <button onclick="changeTeamCount(-1)" class="w-16 h-16 rounded-full bg-gray-100 hover:bg-gray-200 text-3xl font-bold text-indigo-900 flex items-center justify-center transition active:scale-90">-</button>
                  <span class="text-6xl font-black text-indigo-600 w-20">${teamCount}</span>
                  <button onclick="changeTeamCount(1)" class="w-16 h-16 rounded-full bg-gray-100 hover:bg-gray-200 text-3xl font-bold text-indigo-900 flex items-center justify-center transition active:scale-90">+</button>
                </div>

                <button onclick="startGame()" class="w-full px-8 py-4 bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white rounded-2xl text-2xl font-bold shadow-lg transform transition active:scale-95">
                  Let's Play!
                </button>
              </div>
            </div>
          `;
          break;

        case 'LEVEL_TRANSITION':
          root.innerHTML = `
            <div class="text-center animate-fade-in z-10 relative text-white">
              <h2 class="text-6xl font-black mb-6 drop-shadow-md">Level ${currentLevel.level}</h2>
              <p class="text-2xl opacity-90">${currentLevel.description}</p>
              <div class="mt-12 flex justify-center">
                <div class="w-16 h-16 border-4 border-white/30 border-t-white rounded-full animate-spin"></div>
              </div>
            </div>
          `;
          break;

        case 'SHOWING':
          let contentHTML = '';
          if (currentQuestion.type === 'sentence') {
            const extraClasses = currentLevel.level === 4 ? `whitespace-nowrap level-4-anim-${currentQuestionIndex % 3}` : '';
            contentHTML = `<h2 class="text-4xl md:text-5xl font-bold text-center leading-tight drop-shadow-lg inline-block ${extraClasses}">${currentQuestion.text}</h2>`;
          } else {
            const rotations = ['rotate-3', '-rotate-3', 'rotate-6', '-rotate-6', 'rotate-2', '-rotate-2'];
            const wordsHTML = randomizedWords.map((word, i) => {
              if (!word) return `<div class="flex items-center justify-center h-20"></div>`;
              
              const staticRot = rotations[i % rotations.length];
              let animClass = staticRot;
              let animStyle = '';
              
              if (currentLevel.level === 3) {
                animClass = 'level-3-anim';
                animStyle = `animation-delay: -${i * 0.2}s`;
              } else if (currentLevel.level === 5) {
                animClass = `level-5-anim-${i % 4}`;
                animStyle = `animation-delay: ${(i % 3) * 0.2}s`;
              }

              return `
                <div class="flex items-center justify-center h-20">
                  <span class="bg-white text-indigo-900 px-4 py-2 md:px-6 md:py-3 rounded-2xl shadow-xl font-extrabold text-lg md:text-2xl text-center transform inline-block ${animClass}" style="${animStyle}">
                    ${word}
                  </span>
                </div>
              `;
            }).join('');
            contentHTML = `<div class="grid grid-cols-3 sm:grid-cols-4 gap-4 w-full px-4">${wordsHTML}</div>`;
          }

          root.innerHTML = `
            <div class="w-full max-w-3xl flex flex-col items-center justify-center animate-fade-in z-10 relative text-white">
              <div class="w-full h-3 bg-white/20 rounded-full mb-12 overflow-hidden shadow-inner">
                <div id="timer-bar-fill" class="h-full bg-gradient-to-r from-green-400 to-yellow-400 transition-all duration-75 ease-linear" style="width: ${timeLeft}%"></div>
              </div>
              <div class="flex-1 w-full flex items-center justify-center min-h-[300px]">
                ${contentHTML}
              </div>
            </div>
          `;
          break;

        case 'WAITING':
          root.innerHTML = `
            <div class="w-full max-w-2xl animate-fade-in z-10 relative text-white text-center">
              <h2 class="text-5xl md:text-7xl font-black mb-12 drop-shadow-xl tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-pink-300">
                Time's Up!
              </h2>
              <p class="text-2xl md:text-3xl font-bold mb-12 drop-shadow-md">
                Teams, finish your writing...
              </p>
              <div class="flex flex-col gap-5">
                <button onclick="handleShowAgain()" class="w-full px-8 py-4 bg-indigo-500/40 hover:bg-indigo-500/60 border-2 border-indigo-300/30 text-white rounded-3xl text-2xl font-bold backdrop-blur-sm shadow-lg transform transition hover:scale-105 active:scale-95">
                  ↺ Show Again
                </button>
                <button onclick="revealAnswer()" class="w-full px-8 py-5 bg-white hover:bg-gray-100 text-indigo-900 rounded-3xl text-3xl font-extrabold shadow-[0_0_30px_rgba(255,255,255,0.4)] transform transition hover:scale-105 active:scale-95">
                  Show Correct Answer
                </button>
              </div>
            </div>
          `;
          break;

        case 'REVEAL':
          const teamsHTML = teams.map(team => {
            const isSelected = roundWinners.has(team.id);
            const classes = isSelected 
              ? 'bg-green-100 border-green-500 text-green-700 shadow-md transform scale-105' 
              : 'bg-gray-50 border-transparent text-gray-400 hover:bg-gray-100';
            
            return `
              <button onclick="toggleWinner(${team.id})" class="p-4 rounded-xl text-xl font-bold transition-all border-4 flex items-center justify-center gap-2 ${classes}">
                ${team.name}
                ${isSelected ? '<span class="text-green-500 text-2xl font-black">✓</span>' : ''}
              </button>
            `;
          }).join('');

          root.innerHTML = `
            <div class="w-full max-w-4xl text-center animate-fade-in z-10 relative">
              <div class="bg-white p-8 md:p-12 rounded-3xl shadow-2xl border-b-8 border-indigo-500">
                <p class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-2">Correct Answer</p>
                <h2 class="text-3xl md:text-5xl font-extrabold mb-10 text-indigo-900 leading-tight">
                  ${currentQuestion.text}
                </h2>
                <div class="border-t border-gray-100 pt-8 pb-4">
                  <p class="text-xl font-bold text-gray-600 mb-6 uppercase tracking-wider">Tick the teams that got it right!</p>
                  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    ${teamsHTML}
                  </div>
                </div>
                <button onclick="handleNext()" class="mt-8 w-full px-8 py-4 bg-gray-900 hover:bg-black text-white rounded-2xl text-xl font-bold shadow-md transition transform active:scale-95">
                  ${currentQuestionIndex < currentLevel.questions.length - 1 ? 'Next Question' : 'Continue Game'}
                </button>
              </div>
            </div>
          `;
          break;

        case 'END':
          const sortedTeams = [...teams].sort((a, b) => b.score - a.score);
          const topScore = sortedTeams[0]?.score || 0;
          
          const leaderboardHTML = sortedTeams.map((team, index) => {
            const isWinner = index === 0 && topScore > 0;
            const classes = isWinner ? 'bg-yellow-400/20 border border-yellow-400/50' : 'bg-white/5';
            const numClasses = isWinner ? 'text-yellow-400' : 'text-gray-300';
            
            return `
              <div class="flex justify-between items-center p-4 rounded-2xl ${classes}">
                <div class="flex items-center gap-4">
                  <span class="text-2xl font-bold ${numClasses}">#${index + 1}</span>
                  <span class="text-2xl font-bold">${team.name}</span>
                  ${isWinner ? '<span class="text-3xl">🏆</span>' : ''}
                </div>
                <span class="text-3xl font-black text-white">${team.score}</span>
              </div>
            `;
          }).join('');

          root.innerHTML = `
            <div class="text-center animate-fade-in z-10 relative text-white bg-white/10 backdrop-blur-md p-10 md:p-14 rounded-3xl border border-white/20 shadow-2xl max-w-2xl w-full">
              <h1 class="text-6xl font-black mb-8 text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-pink-400">
                Game Over!
              </h1>
              <div class="space-y-4 mb-10 text-left">
                ${leaderboardHTML}
              </div>
              <button onclick="goToSetup()" class="px-10 py-4 bg-white text-indigo-900 hover:bg-indigo-50 rounded-full text-xl font-bold shadow-xl transition transform hover:scale-105 active:scale-95 w-full">
                Play Again
              </button>
            </div>
          `;
          break;
      }
    }

    function renderHUD(currentLevel) {
      hud.classList.remove('hidden');
      const teamsScoresHTML = teams.map(team => `
        <div class="bg-black/40 px-4 py-1.5 rounded-full backdrop-blur-sm shadow-lg text-sm md:text-base flex items-center gap-3">
          <span>${team.name}</span>
          <span class="bg-white/20 px-2 py-0.5 rounded-md">${team.score} pts</span>
        </div>
      `).join('');

      hud.innerHTML = `
        <div class="bg-black/40 px-5 py-2 rounded-full backdrop-blur-sm shadow-lg mb-2 inline-block">
          Level ${currentLevel.level} <span class="opacity-50 mx-2">|</span> ${currentQuestionIndex + 1}/${currentLevel.questions.length}
        </div>
        <div class="flex flex-col items-end gap-2 text-white">
          ${teamsScoresHTML}
        </div>
      `;
    }

    // Initialize the app
    setGameState('START');

  </script>
</body>
</html>
