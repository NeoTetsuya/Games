        // --- Sound Synthesizer Fallback ---
        class GameSynth {
            constructor() {
                this.ctx = null;
            }
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            }
            playTone(freq, type, duration, vol = 0.1) {
                try {
                    this.init();
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                    gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start();
                    osc.stop(this.ctx.currentTime + duration);
                } catch (e) {
                    console.warn("Synth failed", e);
                }
            }
            playStart() {
                // Dramatic game show introductory theme arpeggio (A Major climb)
                const notes = [220, 277.18, 329.63, 440, 554.37, 659.25, 880];
                notes.forEach((freq, index) => {
                    setTimeout(() => {
                        this.playTone(freq, 'triangle', 0.6, 0.15);
                    }, index * 120);
                });
            }
            playCorrect() {
                this.playTone(523.25, 'triangle', 0.2, 0.15); // C5
                setTimeout(() => this.playTone(659.25, 'triangle', 0.2, 0.15), 150); // E5
                setTimeout(() => this.playTone(783.99, 'triangle', 0.4, 0.2), 300); // G5
            }
            playWrong() {
                this.playTone(220, 'sawtooth', 0.5, 0.2); // A3
                setTimeout(() => this.playTone(196, 'sawtooth', 0.6, 0.2), 200); // G3
            }
            playThinking() {
                // Subtle tension building ambient tone
                this.playTone(110, 'sine', 1.5, 0.08); // low A2
                setTimeout(() => {
                    this.playTone(116.54, 'sine', 1.5, 0.05); // low chromatic rise
                }, 750);
            }
            playSelect() {
                this.playTone(440, 'sine', 0.1, 0.1); // A4
            }
            playTick() {
                this.playTone(880, 'sine', 0.05, 0.05); // high click
            }
        }

        const playExternalSound = (type, isMuted) => {
            if (isMuted) return;
            try {
                if (type === 'correct' || type === 'wrong' || type === 'start') {
                    sounds.thinking.pause();
                }
                const audio = sounds[type];
                if (audio) {
                    audio.currentTime = 0;
                    audio.play().catch((err) => {
                        console.warn(`External audio failed for ${type}. Falling back to Synthesizer:`, err);
                        triggerSynthFallback(type);
                    });
                } else {
                    triggerSynthFallback(type);
                }
            } catch (e) {
                triggerSynthFallback(type);
            }
        };

            if (type === 'correct') synth.playCorrect();

        const shuffleQuestionOptions = (question) => {
            const optionsWithMeta = question.options.map((opt, idx) => ({
                text: opt,
                isCorrect: idx === question.correctIndex
            }));
            for (let i = optionsWithMeta.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [optionsWithMeta[i], optionsWithMeta[j]] = [optionsWithMeta[j], optionsWithMeta[i]];
            }
            return {
                ...question,
                options: optionsWithMeta.map(o => o.text),
                correctIndex: optionsWithMeta.findIndex(o => o.isCorrect)
            };
        };

                const nextMuted = !isMuted;
                setIsMuted(nextMuted);
                window.isAudioMuted = nextMuted;
                if (nextMuted) {
                    stopExternalSound('thinking');
                } else if (gameState === 'playing' && selectedAnswer === null && !isAnswerRevealed) {
                    playExternalSound('thinking', false);
                }
            };

            const handleInteractionAudioUnlock = () => {
                synth.init();
            };

            useEffect(() => {
                if (gameState !== 'playing' || selectedAnswer !== null || isAnswerRevealed || audienceResults || phoneFriendAdvice) {
                    return;
                }
                if (timeLeft === 0) {
                    handleTimeOut();
                    return;
                }
                const timer = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 6 && !isMuted) {
                            synth.playTick();
                        }
                        return prev - 1;
                    });
                }, 1000);
                return () => clearInterval(timer);
            }, [timeLeft, gameState, selectedAnswer, isAnswerRevealed, audienceResults, phoneFriendAdvice, isMuted]);

            const handleTimeOut = () => {
                stopExternalSound('thinking');
                setSelectedAnswer(-1);
                setIsAnswerRevealed(true);
                playExternalSound('wrong', isMuted);
                setTurnMessage(`Time's up! The right answer was "${currentQuestion.options[currentQuestion.correctIndex]}".`);
                setTimeout(() => {
                    advanceTurn();
                }, 3500);

            const loadNextQuestion = () => {
                const activeTeam = teamsRef.current[teamTurnRef.current];
                const teamLevel = activeTeam.level; // current index (0 to 14)

                // Level-Locked Tiers:
                // Levels 1-5 (indices 0 to 4): A1-A2 (Difficulty 1)
                // Levels 6-10 (indices 5 to 9): B1 (Difficulty 2)
                // Levels 11-15 (indices 10 to 14): B2 (Difficulty 3)
                let targetDiff = 1;
                if (teamLevel >= 5 && teamLevel <= 9) targetDiff = 2;
                if (teamLevel >= 10) targetDiff = 3;

                // Pull only available questions corresponding to that difficulty
                let available = questionBank.filter(q => q.difficulty === targetDiff && !usedQuestionsRef.current.has(q.id));
                if (available.length === 0) {
                    // Fallback to absolute pool if a difficulty runs dry
                    available = questionBank.filter(q => !usedQuestionsRef.current.has(q.id));
                }

                if (available.length > 0) {
                    const selected = available[Math.floor(Math.random() * available.length)];
                    const shuffled = shuffleQuestionOptions(selected);
                    setCurrentQuestion(shuffled);
                    usedQuestionsRef.current.add(selected.id);
                } else {
                    playExternalSound('wrong', isMuted);
                    setGameState('result');
                    return;
                }

                setSelectedAnswer(null);
                setIsAnswerRevealed(false);
                setHiddenAnswers([]);
                setTurnMessage("");
                setAudienceResults(null);
                setPhoneFriendAdvice(null);
                setTimeLeft(timeLimit);

                if (globalRoundRef.current === 0 && teamTurnRef.current === 0) {
                    // Slight timeout delay so intro music isn't cut off instantly
                    setTimeout(() => playExternalSound('thinking', isMuted), 3500);
                } else {
                    playExternalSound('thinking', isMuted);
                }
            };

            const handleAnswerClick = (index) => {
                if (selectedAnswer !== null || isAnswerRevealed) return;
                synth.playSelect();
                stopExternalSound('thinking');
                setSelectedAnswer(index);

                setTimeout(() => {
                    setIsAnswerRevealed(true);
                    const activeTeam = teamsRef.current[teamTurnRef.current];
                    const isCorrect = index === currentQuestion.correctIndex;

                    if (isCorrect) {
                        playExternalSound('correct', isMuted);
                        const wonAmount = prizeMoney[activeTeam.level];
                        const newLevel = activeTeam.level + 1;
                        setTurnMessage(`Correct! ${activeTeam.name} advances to ${formatMoney(wonAmount)}!`);
                        
                        setTeams(prev => prev.map((t, idx) => 
                            idx === teamTurnRef.current 
                                ? { ...t, score: wonAmount, level: Math.min(newLevel, prizeMoney.length) } 
                                : t
                        ));
                    } else {
                        playExternalSound('wrong', isMuted);
                        
                        let checkpointPrize = 0;
                        const currentLvl = activeTeam.level;
                        if (currentLvl >= 10) {
                            checkpointPrize = prizeMoney[9]; 
                        } else if (currentLvl >= 5) {
                            checkpointPrize = prizeMoney[4]; 
                        }

                        setTurnMessage(`Incorrect! Right answer: "${currentQuestion.options[currentQuestion.correctIndex]}". Reached safety net: ${formatMoney(checkpointPrize)}`);
                        
                        setTeams(prev => prev.map((t, idx) => 
                            idx === teamTurnRef.current 
                                ? { ...t, score: checkpointPrize } 
                                : t
                        ));
                    }

                    setTimeout(() => {
                        advanceTurn();
                    }, 4000);

                }, 2000);
            };

            const use5050 = () => {
                const activeTeam = teams[currentTeamTurn];
                if (!activeTeam.lifelines.fiftyFifty || selectedAnswer !== null) return;
                synth.playTone(600, 'sine', 0.25);

                setTeams(prev => prev.map((t, idx) => 
                    idx === currentTeamTurn ? { ...t, lifelines: { ...t.lifelines, fiftyFifty: false } } : t
                ));

                const wrongIndices = [0, 1, 2, 3].filter(i => i !== currentQuestion.correctIndex);
                wrongIndices.sort(() => Math.random() - 0.5);
                setHiddenAnswers([wrongIndices[0], wrongIndices[1]]);
            };

            const usePhoneFriend = () => {
                const activeTeam = teams[currentTeamTurn];
                if (!activeTeam.lifelines.phoneFriend || selectedAnswer !== null) return;
                synth.playTone(600, 'sine', 0.25);

                setTeams(prev => prev.map((t, idx) => 
                    idx === currentTeamTurn ? { ...t, lifelines: { ...t.lifelines, phoneFriend: false } } : t
                ));

                const correctLetter = ['A', 'B', 'C', 'D'][currentQuestion.correctIndex];
                const wrongs = [0, 1, 2, 3].filter(i => i !== currentQuestion.correctIndex && !hiddenAnswers.includes(i));
                const randomWrongLetter = ['A', 'B', 'C', 'D'][wrongs[Math.floor(Math.random() * wrongs.length)]];

                const dice = Math.random();
                let speech = "";
                if (dice > 0.65) {
                    speech = `I am absolutely sure! The correct answer is definitely ${correctLetter}. Go lock it in!`;
                } else if (dice > 0.35) {
                    speech = `I'm fairly sure it's ${correctLetter}. Though there is a small chance it might be ${randomWrongLetter}.`;
                } else {
                    speech = `This is tricky... I have a gut feeling about ${randomWrongLetter}, but don't count on me entirely!`;
                }
                setPhoneFriendAdvice(speech);
            };

            const useAskAudience = () => {
                const activeTeam = teams[currentTeamTurn];
                if (!activeTeam.lifelines.askAudience || selectedAnswer !== null) return;
                synth.playTone(600, 'sine', 0.25);

                setTeams(prev => prev.map((t, idx) => 
                    idx === currentTeamTurn ? { ...t, lifelines: { ...t.lifelines, askAudience: false } } : t
                ));

                const activeIndices = [0, 1, 2, 3].filter(i => !hiddenAnswers.includes(i));
                const isAudienceSmart = Math.random() > 0.3; 
                const favoriteIdx = isAudienceSmart ? currentQuestion.correctIndex : activeIndices[Math.floor(Math.random() * activeIndices.length)];

                let results = [0, 0, 0, 0];
                let favorValue = Math.floor(Math.random() * 20) + 45; 
                if (activeIndices.length === 2) {
                    favorValue = Math.floor(Math.random() * 20) + 65; 
                }

                results[favoriteIdx] = favorValue;
                let remaining = 100 - favorValue;
                const others = activeIndices.filter(i => i !== favoriteIdx);

                others.forEach((idx, i) => {
                    if (i === others.length - 1) {
                        results[idx] = remaining;
                    } else {
                        const val = Math.floor(Math.random() * remaining);
                        results[idx] = val;
                        remaining -= val;
                    }
                });
                setAudienceResults(results);
            };

            const advanceTurn = () => {
                let nextTeam = teamTurnRef.current + 1;
                let nextGlobalRound = globalRoundRef.current;

                if (nextTeam >= teamsRef.current.length) {
                    nextTeam = 0;
                    nextGlobalRound++;
                }

                if (nextGlobalRound >= prizeMoney.length) {
                    playExternalSound('wrong', isMuted);
                    setGameState('result');
                } else {
                    teamTurnRef.current = nextTeam;
                    globalRoundRef.current = nextGlobalRound;

                    setGlobalRound(nextGlobalRound);

                }

                        ${gameState === 'intro' && html`

                                            const letters = ['A', 'B', 'C', 'D'];
                                            const isHidden = hiddenAnswers.includes(idx);
                                            
                                            let optionStateClass = 'border-blue-500/40 bg-slate-900 hover:bg-blue-900/40 hover:border-blue-400';
                                            
                                            if (selectedAnswer === idx && !isAnswerRevealed) {
                                                optionStateClass = 'border-amber-400 bg-amber-500 text-slate-950 font-black';
                                            } else if (isAnswerRevealed) {
                                                if (idx === currentQuestion.correctIndex) {
                                                    optionStateClass = 'border-emerald-400 bg-emerald-500 text-slate-950 font-black animate-pulse';
                                                } else if (selectedAnswer === idx) {
                                                    optionStateClass = 'border-rose-400 bg-rose-600 text-white font-black';
                                                }
                                            }

                                            return html`
                                                <button
                                                    key=${idx}
                                                    onClick=${() => handleAnswerClick(idx)}
                                                    disabled=${selectedAnswer !== null || isHidden}
                                                    class=${`min-h-[56px] rounded-xl border p-3 flex items-center transition-all ${optionStateClass} ${
                                                        isHidden ? 'opacity-0 cursor-default select-none pointer-events-none' : 'opacity-100'
                                                    }`}
                                                >
                                                    <span class=${`text-xs font-black mr-3 px-2 py-1 rounded bg-slate-950/80 border border-slate-800 ${selectedAnswer === idx ? 'text-slate-950 bg-white border-white' : 'text-yellow-400'}`}>
                                                        ${letters[idx]}
                                                    </span>
                                                    <span class="text-sm sm:text-base text-left flex-1 font-bold leading-tight">${option}</span>
                                                </button>
                                            `;
                                        })}
                                    </div>
                                </div>

                                <div class=${`w-full xl:w-[28%] bg-slate-900/85 border border-blue-900/50 rounded-2xl p-4 backdrop-blur-md shadow-lg flex flex-col justify-between ${mobileTab === 'ladder' ? 'flex' : 'hidden xl:flex'}`}>
                                    <h3 class="text-center font-black text-blue-400 text-sm tracking-widest uppercase border-b border-blue-900/40 pb-3 mb-3">
                                        Money Tree (CEFR Tiers)
                                    </h3>

                                    <div class="flex items-end mb-2 pr-1">
                                        <div class="w-[85px]" />
                                        <div class="flex-1 flex gap-1.5 justify-between">
                                            ${teams.map((t, idx) => html`
                                                <div 
                                                    key=${t.id} 
                                                    class=${`flex-1 text-center font-black text-[9px] truncate border-b-2 pb-1 ${
                                                        idx === currentTeamTurn ? 'text-yellow-400 border-yellow-400' : 'text-slate-500 border-slate-800'
                                                    }`}
                                                >
                                                    ${t.name.split(' ')[0]}
                                                </div>
                                            `)}
                                        </div>
                                    </div>

                                    <div class="flex-1 flex flex-col justify-between space-y-[2px] mb-2">
                                        ${[...prizeMoney].reverse().map((amount, revIdx) => {
                                            const levelIndex = prizeMoney.length - 1 - revIdx;
                                            const isCheckpoint = safetyMilestones.includes(levelIndex);
                                            let tierLabel = "A1-A2";
                                            if (levelIndex >= 5 && levelIndex <= 9) tierLabel = "B1";
                                            if (levelIndex >= 10) tierLabel = "B2";

                                            return html`
                                                <div 
                                                    key=${amount} 
                                                    class=${`flex items-center rounded-lg px-1 py-0.5 transition-colors ${
                                                        isCheckpoint ? 'bg-yellow-400/5 border-y border-yellow-400/20' : 'hover:bg-slate-800/40'
                                                    }`}
                                                >
                                                    <span class=${`w-[85px] font-mono text-right text-[11px] sm:text-xs font-black pr-3 flex justify-between items-center ${
                                                        isCheckpoint ? 'text-yellow-400' : 'text-slate-300'
                                                    }`}>
                                                        <span class="text-[9px] text-blue-400 font-sans tracking-tight">${tierLabel}</span>
                                                        <span>${formatMoney(amount)}</span>
                                                    </span>

                                                    <div class="flex-1 flex gap-1.5 h-4 sm:h-5">
                                                        ${teams.map((t, idx) => {
                                                            const displayLevel = Math.min(t.level, prizeMoney.length - 1);
                                                            const isCurrentlyHere = levelIndex === displayLevel;
                                                            const hasPassedThis = levelIndex < displayLevel;
                                                            const isActiveTurn = idx === currentTeamTurn;

                                                            let bgStateClass = 'bg-slate-950/40 border border-slate-800/60';
                                                            let markerText = '';

                                                            if (isCurrentlyHere) {
                                                                if (isActiveTurn) {
                                                                    bgStateClass = 'bg-yellow-400 border-yellow-200 border scale-110 z-10';
                                                                    markerText = '♦';
                                                                } else {
                                                                    bgStateClass = 'bg-blue-600 border-blue-400 text-white border opacity-90';
                                                                    markerText = '✦';
                                                                }
                                                            } else if (hasPassedThis) {
                                                                bgStateClass = 'bg-emerald-950/50 border border-emerald-900/40 text-emerald-400';
                                                                markerText = '✓';
                                                            }

                                                            return html`
                                                                <div 
                                                                    key=${t.id} 
                                                                    class=${`flex-1 rounded flex items-center justify-center transition-all text-[9px] font-black ${bgStateClass}`}
                                                                >
                                                                    <span class=${isCurrentlyHere && isActiveTurn ? 'text-slate-950' : ''}>
                                                                        ${markerText}
                                                                    </span>
                                                                </div>
                                                            `;
                                                        })}
                                                    </div>
                                                </div>
                                            `;
                                        })}
                                    </div>

                                    <div class="bg-slate-950/60 border border-slate-800 rounded-xl p-2.5 text-[10px] text-slate-400 font-medium">
                                        <p class="flex items-center gap-1.5 mb-1 text-yellow-400 font-extrabold uppercase">
                                            <${Award} /> Checkpoint nets:
                                        </p>
                                        <span>Drops safely to B1 milestone <strong class="text-yellow-400">$1,000</strong> or B2 milestone <strong class="text-yellow-400">$32,000</strong> once reached!</span>
                                    </div>
                                </div>
                            </div>
                        `}

                        ${gameState === 'result' && html`
                            <div class="w-full max-w-2xl mx-auto bg-slate-900/95 border border-yellow-500/40 rounded-2xl p-6 sm:p-10 backdrop-blur-xl shadow-2xl text-center">
                                <div class="flex justify-center mb-4 text-6xl animate-bounce">
                                    <${Trophy} />
                                </div>
                                
                                <h2 class="text-4xl font-black text-yellow-400 tracking-wider uppercase mb-1 drop-shadow">Diagnostic Complete</h2>
                                <p class="text-slate-300 text-sm mb-8">CEFR Final Diagnostic Scoreboard</p>

                                <div class="space-y-4 mb-10 text-left">
                                    ${[...teams]
                                        .sort((a, b) => b.score - a.score)
                                        .map((team, idx) => {
                                            const isWinner = idx === 0;
                                            return html`
                                                <div 
                                                    key=${team.id} 
                                                    class=${`p-4 rounded-xl border flex items-center justify-between ${
                                                        isWinner 
                                                            ? 'bg-gradient-to-r from-blue-950 to-slate-900 border-yellow-400' 
                                                            : 'bg-slate-950/50 border-slate-800'
                                                    }`}
                                                >
                                                    <div class="flex items-center gap-4">
                                                        <span class=${`text-2xl font-black ${isWinner ? 'text-yellow-400' : 'text-slate-500'}`}>
                                                            #{idx + 1}
                                                        </span>
                                                        <div>
                                                            <p class="font-extrabold text-base">${team.name}</p>
                                                            <p class="text-[10px] text-slate-400 uppercase tracking-widest">
                                                                Reached level ${team.level}/15 (${team.level < 5 ? 'Diagnosed: A1-A2' : team.level < 10 ? 'Diagnosed: B1' : 'Diagnosed: B2'})
                                                            </p>
                                                        </div>
                                                    </div>
                                                    <div class="text-right">
                                                        <span class="font-black text-xl text-green-400">
                                                            ${formatMoney(team.score)}
                                                        </span>
                                                    </div>
                                                </div>
                                            `;
                                        })}
                                </div>

                                <button 
                                    onClick=${() => {
                                        synth.playTone(523.25, 'triangle', 0.1);
                                        setGameState('setup');
                                    }}
                                    class="px-8 py-3.5 bg-slate-850 hover:bg-slate-800 border border-blue-500/30 hover:border-blue-400 rounded-xl font-bold transition-colors text-xs tracking-wider uppercase text-blue-300 hover:text-white"
                                >
                                    Configure New Play
                                </button>
                            </div>
                        `}
                    </main>

                    <footer class="text-center py-4 border-t border-blue-900/40 bg-slate-950/80 text-[10px] text-slate-500 mt-4 z-20">
                        <p>© 2026 Who Wants to Be a Millionaire • CEFR Grammar Diagnostic Edition</p>
                    </footer>

                    ${audienceResults && html`
                        <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
                            <div class="bg-slate-900 border border-blue-400/50 rounded-2xl p-6 sm:p-8 max-w-md w-full text-center shadow-2xl relative">
                                <div class="flex justify-center mb-2 text-blue-400"><${BarChart2} /></div>
                                <h3 class="text-xl font-black text-yellow-400 mb-6 uppercase tracking-wider">Audience Polling</h3>
                                
                                <div class="flex items-end justify-between gap-3 h-40 mb-8 px-4">
                                    ${audienceResults.map((pct, idx) => html`
                                        <div key=${idx} class="flex-1 flex flex-col items-center h-full justify-end">
                                            <span class="text-[11px] font-bold text-slate-300 mb-1">${pct}%</span>
                                            <div class="w-full flex items-end justify-center">
                                                <div 
                                                    class=${`w-full max-w-[32px] rounded-t-md transition-all duration-1000 ${
                                                        idx === currentQuestion.correctIndex ? 'bg-gradient-to-t from-emerald-600 to-emerald-400' : 'bg-gradient-to-t from-blue-600 to-blue-400'
                                                    }`}
                                                    style=${{ height: `${pct || 1}%`, minHeight: '3px' }}
                                                />
                                            </div>
                                            <span class="mt-2 font-black text-sm text-yellow-400">
                                                ${['A', 'B', 'C', 'D'][idx]}
                                            </span>
                                        </div>
                                    `)}
                                </div>

                                <button 
                                    onClick=${() => {
                                        synth.playTone(300, 'sine', 0.1);
                                        setAudienceResults(null);
                                    }}
                                    class="w-full py-3 bg-blue-950 hover:bg-blue-900 border border-blue-500/40 hover:border-blue-400 rounded-xl font-bold transition-all text-xs uppercase text-blue-300 hover:text-white"
                                >
                                    Resume Game
                                </button>
                            </div>
                        </div>
                    `}

                    ${phoneFriendAdvice && html`
                        <div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm p-4">
                            <div class="bg-slate-900 border border-purple-400/50 rounded-2xl p-6 sm:p-8 max-w-md w-full text-center shadow-2xl relative">
                                <div class="flex justify-center mb-2 text-purple-400"><${Phone} /></div>
                                <h3 class="text-xl font-black text-yellow-400 mb-4 uppercase tracking-wider">Line Connection Live</h3>
                                
                                <div class="bg-slate-950/80 p-5 rounded-xl border border-slate-800/80 text-left mb-6 flex gap-4 items-start">
                                    <div class="p-2.5 bg-purple-950/50 rounded-lg text-purple-400 shrink-0">
                                        <${User} />
                                    </div>
                                    <div>
                                        <p class="text-xs text-slate-400 font-extrabold uppercase mb-1">Your Friend says:</p>
                                        <p class="text-sm italic text-slate-200 leading-relaxed font-semibold">"${phoneFriendAdvice}"</p>
                                    </div>
                                </div>

                                <button 
                                    onClick=${() => {
                                        synth.playTone(300, 'sine', 0.1);
                                        setPhoneFriendAdvice(null);
                                    }}
                                    class="w-full py-3 bg-purple-950 hover:bg-purple-900 border border-purple-500/40 hover:border-purple-400 rounded-xl font-bold transition-all text-xs uppercase text-purple-300 hover:text-white"
                                >
                                    Thank Friend & Resume
                                </button>
                            </div>
                        </div>
                    `}
                </div>
            `;
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(html`<${App} />`);
    </script>
</body>
</html>
